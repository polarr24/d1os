<!DOCTYPE html><!-- d1os v7.50 -->
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#08090C">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>D1 OS</title>
<style>
:root{
  /* v7.50 — BLUE / BLACK. Palette verified with computed WCAG ratios, not by eye:
     accent text #60A5FA 7.3:1 on card · primary fill #2563EB carries white at 5.2:1
     · faint 5.6:1 · dim 8.3:1. One hue, one neutral ramp, nothing decorative. */
  --bg:#08090C; --bg2:#0C0F14; --card:#101319; --card2:#161A22;
  --line:#20242C; --line2:#2B313B;
  --txt:#F4F6F8; --dim:#A7AEB8; --faint:#868E9A;
  --amber:#60A5FA;         /* accent (name kept for API stability across 4 years of code) */
  --amber-dim:#1E3A5F;
  --fill:#2563EB;          /* primary action fill — white text, 5.17:1 */
  --cyan:#94A3B8;          /* steel: targets + secondary data */
  --cyan-dim:#2B3948;
  --green:#4ADE80; --red:#F87171; --radius:14px; --glow:none;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding-bottom:calc(84px + env(safe-area-inset-bottom));min-height:100vh;
  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;position:relative}
/* stadium-at-night ambience: two distant light sources + a field-grid whisper. Pure CSS, zero assets. */
body::before{content:'';position:fixed;inset:0;z-index:-2;pointer-events:none;
  background:linear-gradient(180deg,#0B0E14 0%,var(--bg) 44%)}
body::after{content:'';position:fixed;inset:0;z-index:-1;pointer-events:none;opacity:.5;
  background:repeating-linear-gradient(0deg,transparent 0 63px,rgba(255,255,255,.011) 63px 64px)}
h1,h2,h3{font-weight:800;letter-spacing:.02em}
.mono{font-variant-numeric:tabular-nums;letter-spacing:-.01em}
::selection{background:var(--fill);color:#fff}
#hdr{position:sticky;top:0;z-index:50;background:rgba(8,9,12,.92);backdrop-filter:blur(18px) saturate(1.4);-webkit-backdrop-filter:blur(18px) saturate(1.4);
  border-bottom:1px solid var(--line);
  padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;justify-content:space-between;align-items:center}
#hdr .brand{font-size:15px;font-weight:900;letter-spacing:.16em;
  color:var(--txt)}
#hdr .brand::after{content:'';display:inline-block;width:6px;height:6px;border-radius:99px;background:var(--amber);
  margin-left:7px;vertical-align:2px;box-shadow:none;animation:beacon 2.6s ease-in-out infinite}
@keyframes beacon{0%,100%{opacity:1}50%{opacity:.35}}
/* v7.45 BROADCAST HUD — a real scoreboard: segmented cells, hero countdown, ambient week rail.
   Designed to read at a glance from arm's length, not to be studied. */
#hdr{padding:0!important;display:block!important;overflow:hidden}
.hudwrap{max-width:560px;margin:0 auto;display:flex;align-items:stretch;
  padding:calc(6px + env(safe-area-inset-top)) 14px 0;gap:0}
.hud-brand{display:flex;flex-direction:column;justify-content:center;padding-right:14px;flex-shrink:0}
.hud-brand .bw{font-family:var(--disp);font-weight:400;font-size:23px;letter-spacing:.06em;line-height:.9;
  color:var(--txt)}
.hud-brand .bs{font-size:7px;letter-spacing:.22em;color:var(--faint);font-weight:800;margin-top:3px}
.hud-cells{display:flex;flex:1;align-items:stretch;justify-content:flex-end;gap:0}
.sb-cell{display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:7px 13px 8px;position:relative;min-width:62px}
.sb-cell+.sb-cell::before{content:'';position:absolute;left:0;top:22%;bottom:22%;width:1px;
  background:linear-gradient(180deg,transparent,var(--line),transparent)}
.sb-cell.hero{min-width:74px}
.sb-n{font-family:var(--disp);font-weight:400;font-size:25px;line-height:.95;color:var(--txt);
  letter-spacing:.01em;display:block}
.sb-cell.hero .sb-n{font-size:31px;color:var(--amber);text-shadow:none}
.sb-n .sb-sub{font-style:normal;font-size:13px;color:var(--faint);letter-spacing:0}
.sb-k{font-size:7px;letter-spacing:.16em;color:var(--faint);font-weight:800;margin-top:3px;white-space:nowrap}
#hudRail{height:2px;width:100%;background:rgba(255,255,255,.05);position:relative}
#hudRail i{position:absolute;left:0;top:0;bottom:0;background:var(--amber);
  box-shadow:none;transition:width .5s cubic-bezier(.2,.8,.25,1)}
@media (min-width:1000px){ .hudwrap{max-width:760px} }
main{padding:18px 16px 8px;max-width:560px;margin:0 auto}
.view{display:none}.view.on{display:block;animation:rise .28s cubic-bezier(.2,.8,.25,1)}
@keyframes rise{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:none}}
.card{background:var(--card);
  border:1px solid var(--line);border-radius:var(--radius);padding:18px;margin-bottom:12px}
.card h3{font-size:10.5px;letter-spacing:.19em;color:var(--faint);margin-bottom:14px;text-transform:uppercase;font-weight:800}
.card h3 .r{float:right;color:var(--faint);font-weight:600;letter-spacing:0;text-transform:none}
.big{font-size:38px;font-weight:900;letter-spacing:-.02em}
.row{display:flex;gap:10px;align-items:center}
.grow{flex:1}
.btn{background:var(--card2);
  border:1px solid var(--line2);color:var(--txt);border-radius:10px;
  padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  transition:transform .12s,box-shadow .12s,border-color .12s}
.btn.amber{background:var(--fill);border-color:var(--fill);color:#fff;
  box-shadow:none;text-shadow:none}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 10px;font-size:12px;border-radius:9px}
.btn:active{transform:scale(.96)}
.btn.amber:active{box-shadow:none}
input,select,textarea{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  padding:11px 12px;font-size:16px;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan-dim)}
label{font-size:11px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;display:block;margin:10px 0 5px}
.pill{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.06em;padding:3px 9px;border-radius:99px;
  background:var(--bg2);border:1px solid var(--line);color:var(--dim)}
.pill.amber{color:var(--amber);border-color:var(--amber-dim)}
.pill.cyan{color:var(--cyan);border-color:var(--cyan-dim)}
.pill.green{color:var(--green);border-color:#2b5c44}
.pill.red{color:var(--red);border-color:#6b2b2b}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(8,9,12,.94);
  backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);
  border-top:1px solid var(--line);
  padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;background:none;border:none;color:var(--faint);font-family:inherit;font-size:10px;
  font-weight:800;letter-spacing:.08em;padding:11px 0 12px;cursor:pointer;display:flex;flex-direction:column;gap:4px;align-items:center;
  position:relative;transition:color .15s}
#nav button .ic{line-height:0;transition:transform .15s}
#nav button .ic svg{width:23px;height:23px}
#nav button.on{color:var(--amber)}
#nav button.on .ic{transform:translateY(-1px);filter:none}
#nav button.on::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:26px;height:2.5px;
  border-radius:0 0 4px 4px;background:var(--amber);box-shadow:none}
.dots{display:grid;grid-template-columns:repeat(15,1fr);gap:5px}
.dots i{aspect-ratio:1;border-radius:3px;background:var(--bg2);border:1px solid var(--line);transition:background .2s}
.dots i.hit{background:var(--amber);border-color:var(--amber);box-shadow:none}
.dots i.part{background:var(--amber-dim);border-color:var(--amber-dim)}
.chk{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.chk:last-child{border-bottom:none}
.chk .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;font-size:14px;color:#0b1000;font-weight:900}
.chk.done .box{background:var(--amber);border-color:var(--amber)}
.chk.done .t{color:var(--dim);text-decoration:line-through}
.chk .t{font-size:15px;font-weight:600}
.chk .s{font-size:12px;color:var(--faint)}
.bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--amber);border-radius:99px;transition:width .3s}
.bar i.cyan{background:var(--cyan)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--faint);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px 6px 0}
td{padding:8px 8px 8px 0;border-top:1px solid var(--line)}
.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:12px}
.seg button{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:12px;font-weight:800;
  padding:8px 4px;border-radius:8px;cursor:pointer;letter-spacing:.04em}
.seg button.on{background:var(--card2);color:var(--amber)}
details{border-top:1px solid var(--line);padding:10px 0}
details summary{cursor:pointer;font-size:14px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center}
details summary::after{content:'+';color:var(--faint);font-size:18px}
details[open] summary::after{content:'–'}
details .bd{padding:10px 0 4px;font-size:13px;color:var(--dim);line-height:1.55}
.note{font-size:12px;color:var(--faint);line-height:1.6;margin-top:9px}
.flag{background:#14180f;border:1px solid #33401d;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:10px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--amber-dim);
  color:var(--txt);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:700;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px}
.stat .v{font-size:22px;font-weight:900}
.stat .k{font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-top:2px}
.empty{text-align:center;color:var(--faint);font-size:13px;padding:24px 0}
.prio{background:var(--card);border:1px solid var(--line2);border-radius:var(--radius);padding:20px;margin-bottom:12px;position:relative;overflow:hidden;
  box-shadow:0 1px 0 rgba(255,255,255,.05) inset}



.prio .k{font-size:10px;letter-spacing:.14em;color:var(--amber);font-weight:900}
.prio .t{font-size:16px;font-weight:800;margin-top:6px;line-height:1.3}
.prio .w{font-size:12.5px;color:var(--dim);margin-top:7px;font-style:normal;line-height:1.55}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
/* v7.44 GYM MODE — the workout screen reads at arm's length, mid-set, with a pump */
.exrow{padding:13px 0;border-bottom:1px solid var(--line);transition:opacity .2s}
.exrow.is-done{opacity:.42}
.exrow.is-live{background:transparent;
  box-shadow:inset 3px 0 0 var(--amber);padding-left:11px;border-radius:0 10px 10px 0}
.exname{font-family:var(--disp);font-weight:400;font-size:19px;letter-spacing:.03em;line-height:1.1}
.exsets{font-size:13px;color:var(--dim);margin-top:2px;font-weight:600}
.setrow{display:flex;align-items:center;gap:7px;margin-top:8px}
.setdot{width:26px;height:26px;border-radius:8px;border:2px solid var(--line);background:var(--bg2);
  cursor:pointer;flex-shrink:0;transition:transform .12s,background .12s,border-color .12s}
.setdot:active{transform:scale(.88)}
.setdot.on{background:var(--amber);border-color:var(--amber);
  box-shadow:none}
.setct{font-size:11px;color:var(--faint);margin-left:2px;font-weight:800}
.exwt{text-align:right;flex-shrink:0;padding-left:10px}
.exwt-n{font-family:var(--disp);font-weight:400;font-size:34px;line-height:.95;color:var(--cyan);
  text-shadow:none}
.exwt-k{font-size:8.5px;letter-spacing:.1em;color:var(--faint);font-weight:800;margin-top:1px}
.exwt-p{font-size:10px;color:var(--dim);margin-top:3px;font-variant-numeric:tabular-nums}
/* v7.43 (audit #18): desktop is a real citizen — parents and coaches open this on laptops */
@media (min-width:1000px){
  html{font-size:17px}
  main{max-width:760px;padding:28px 20px}
  #hdr>*{max-width:760px}
  #hdr{justify-content:center;gap:60px}
  #nav{left:50%;right:auto;transform:translateX(-50%);width:760px;border-radius:16px 16px 0 0;
    border-left:1px solid var(--line);border-right:1px solid var(--line)}
  .statgrid{grid-template-columns:repeat(4,1fr)}
}
/* ============ player identity card — the hero (v7.36) ============ */
.pcard{position:relative;overflow:hidden;border-radius:16px;padding:24px 22px 20px;margin-bottom:14px;
  background:var(--card2);
  border:1px solid var(--line2);
  box-shadow:0 20px 40px -24px #000,0 1px 0 rgba(255,255,255,.06) inset}

.pc-num{display:none} /* v7.48: a cropped ghost numeral read as an artifact, not as design */
.pc-top,.pc-name,.pc-sub,.pc-rail,.pc-foot,.pc-motto{position:relative;z-index:1}
.pc-top{display:flex;justify-content:space-between;align-items:center;position:relative}
.pc-pos{font-family:var(--disp);font-weight:400;font-size:16px;letter-spacing:.22em;color:var(--amber);
  border:1px solid var(--amber-dim);border-radius:7px;padding:3px 10px 2px;background:rgba(96,165,250,.06)}
.pc-gate{font-size:11px;color:var(--dim)}
.pc-gate b{color:var(--amber);font-size:15px;font-family:var(--disp);font-weight:400;letter-spacing:.03em}
.pc-name{font-family:var(--disp);font-weight:400;font-size:clamp(52px,15vw,74px);line-height:.9;
  letter-spacing:.02em;margin-top:12px;position:relative;
  color:var(--txt))}
.pc-sub{font-size:11px;letter-spacing:.14em;color:var(--faint);margin-top:5px;font-weight:800;position:relative}
.pc-rail{display:grid;grid-template-columns:repeat(5,1fr);margin-top:22px;position:relative;
  border-top:1px solid var(--line);padding-top:18px}
.pc-stat{text-align:center;position:relative;padding:0 2px}
.pc-stat+.pc-stat::before{content:'';position:absolute;left:0;top:6%;bottom:34%;width:1px;background:var(--line)}
.pc-v{font-family:var(--disp);font-weight:400;font-size:33px;letter-spacing:.01em;color:var(--txt);line-height:1}
.pc-u{font-size:11px;color:var(--faint);letter-spacing:0}
.pc-none{color:var(--faint)}
.pc-k{font-size:8px;letter-spacing:.13em;color:var(--faint);text-transform:uppercase;margin-top:7px;font-weight:800}
.pc-foot{display:flex;justify-content:space-between;align-items:center;margin-top:14px;position:relative}
.pc-verif{font-size:9.5px;letter-spacing:.06em;color:var(--faint);font-weight:800}
.pc-ready{font-family:var(--disp);font-weight:400;font-size:14px;letter-spacing:.08em;color:var(--faint)}
.pc-motto{margin-top:14px;font-size:13px;font-style:italic;color:var(--dim);position:relative;
  border-top:1px solid var(--line);padding-top:12px}
/* widget mode (#widget): the glanceable face — iPad split-view / pinned desktop window */
body.wm{padding-bottom:0}
body.wm #hdr,body.wm #nav{display:none}
body.wm main{max-width:none;padding:0;min-height:100vh;display:grid;place-items:center}
.wj{text-align:center;padding:28px 20px}
.wj .n{font-size:clamp(64px,22vw,150px);font-weight:900;letter-spacing:-.04em;line-height:1;
  color:var(--txt))}
.wj .l{font-size:clamp(11px,2.6vw,14px);letter-spacing:.34em;color:var(--dim);text-transform:uppercase;margin-top:6px}
.wj .sub{display:flex;gap:26px;justify-content:center;margin-top:26px}
.wj .sub .v{font-size:clamp(22px,6vw,34px);font-weight:900}
.wj .sub .k{font-size:10px;letter-spacing:.16em;color:var(--faint);text-transform:uppercase;margin-top:2px}
.wj .one{margin-top:26px;font-size:clamp(13px,3.2vw,16px);color:var(--dim)}
.wj .one b{color:var(--amber)}

/* ============ v7.35 display face — broadcast typography, embedded + offline-safe ============
   Bebas Neue (OFL license), subset to 8KB and inlined: the athletic display face of jersey

:root{--disp:'Bebas Neue','Arial Narrow',sans-serif}
#hdr .brand{font-family:var(--disp);font-weight:400;font-size:21px;letter-spacing:.24em}
#hdr .cd b{font-family:var(--disp);font-weight:400;font-size:18px;letter-spacing:.04em}
.big{font-family:var(--disp);font-weight:400;font-size:46px;letter-spacing:.03em}
.stat .v{font-family:var(--disp);font-weight:400;font-size:31px;letter-spacing:.03em}
.card h3{font-family:inherit;font-weight:800;font-size:10.5px;letter-spacing:.19em}
.card h3 .r{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;font-size:11px}
#nav button{font-family:var(--disp);font-weight:400;font-size:12.5px;letter-spacing:.18em}
.prio .k{font-family:inherit;font-weight:800;font-size:10.5px;letter-spacing:.19em}
.prio .t{font-family:var(--disp);font-weight:400;font-size:23px;letter-spacing:.045em}
.wj .n{font-family:var(--disp);font-weight:400}
.wj .l{font-family:var(--disp);font-weight:400}
.seg button{font-family:var(--disp);font-weight:400;letter-spacing:.14em;font-size:13.5px}
.pill{font-family:var(--disp);font-weight:400;letter-spacing:.1em;font-size:12px}

/* ============================================================================
   v7.49 — EDITORIAL. The defect was never the palette: it was ELEVEN IDENTICAL
   ROUNDED RECTANGLES stacked down a page. Uniform card grids are the signature
   of generated UI. Real product design has rhythm — full-bleed moments, sections
   that carry no chrome at all, one dramatic scale jump per screen, and borders
   only where they do work. This layer establishes that rhythm.
   ========================================================================== */

/* 1 · HERO — the identity is not a card. It sits on the page. */
.pcard{background:none!important;border:none!important;border-radius:0!important;
  padding:6px 2px 0!important;margin:0 0 26px!important;box-shadow:none!important;overflow:visible!important}
.pc-top{margin-bottom:2px}
.pc-pos{background:none;border:none;padding:0;font-size:12px;letter-spacing:.3em;color:var(--amber)}
.pc-gate{font-size:10.5px;letter-spacing:.12em;color:var(--faint);text-transform:uppercase}
.pc-gate b{font-size:10.5px;color:var(--faint);font-family:inherit;font-weight:800;letter-spacing:.12em}
.pc-name{font-size:clamp(64px,19vw,104px)!important;line-height:.82!important;margin-top:6px!important;
  letter-spacing:.005em!important}
.pc-sub{font-size:10px;letter-spacing:.2em;color:var(--faint);margin-top:10px}
.pc-rail{border-top:1px solid var(--line2)!important;border-bottom:1px solid var(--line2);
  margin-top:22px!important;padding:20px 0 18px!important}
.pc-v{font-size:38px!important}
.pc-k{font-size:7.5px!important;letter-spacing:.18em!important;margin-top:9px!important}
.pc-stat+.pc-stat::before{top:2px;bottom:26%}
.pc-foot{margin-top:16px!important}
.pc-verif{font-size:9px;letter-spacing:.16em;text-transform:uppercase}
.pc-motto{border-top:none!important;padding-top:0!important;margin-top:20px!important;
  font-size:15px;font-style:normal;color:var(--dim);letter-spacing:.01em}

/* 2 · THE ONE THING — a full-bleed statement, not a widget in a box */
.prio{background:none!important;border:none!important;border-left:none!important;border-radius:0!important;
  padding:0 0 26px!important;margin:0 0 26px!important;border-bottom:1px solid var(--line)!important}
.prio .k{color:var(--amber);font-size:9.5px;letter-spacing:.24em}
.prio .t{font-family:var(--disp);font-weight:400;font-size:clamp(30px,7.6vw,40px);
  letter-spacing:.012em;line-height:1.02;margin-top:12px;color:var(--txt)}
.prio .w{font-size:13.5px;line-height:1.6;color:var(--dim);margin-top:12px;max-width:46ch}

/* 3 · CARDS — chrome only where a card is genuinely a container.
      Borderless by default, separated by rule + space. */
.card{background:none;border:none;border-radius:0;padding:0 0 24px;margin:0 0 24px;
  border-bottom:1px solid var(--line)}
.card:last-child{border-bottom:none}
.card h3{font-size:9.5px;letter-spacing:.24em;color:var(--faint);margin-bottom:16px;font-weight:800}
.card h3 .r{font-size:10.5px;color:var(--faint);letter-spacing:.02em;font-weight:600;text-transform:none}
/* raised variant, used sparingly for true panels */
.card.panel{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:18px;
  margin-bottom:24px}

/* 4 · BUTTONS — a primary action is a full-width bar with real presence */
.btn{border-radius:8px;font-size:13px;letter-spacing:.06em;font-weight:800;padding:13px 16px}
.btn.amber{letter-spacing:.16em;font-size:12.5px;padding:16px}
.btn.sm{padding:8px 11px;font-size:11.5px;letter-spacing:.05em;border-radius:7px}

/* 5 · NUMBERS lead everywhere they appear */
.stat{background:none;border:none;border-radius:0;padding:0}
.statgrid{gap:20px 14px}
.stat .v{font-family:var(--disp);font-weight:400;font-size:34px;line-height:1;color:var(--txt)}
.stat .k{font-size:7.5px;letter-spacing:.18em;margin-top:6px}

/* 6 · rhythm + air */
main{padding:26px 20px 12px}
.note{font-size:12.5px;line-height:1.65;color:var(--faint)}
details{border-top:1px solid var(--line);padding:14px 0}
details summary{font-size:13px;letter-spacing:.01em}
table{font-size:12.5px}
th{font-size:8.5px;letter-spacing:.16em}
@media (min-width:1000px){ main{padding:36px 20px 12px} }

/* ===== v7.50 · TEN HIGHEST-ROI FIXES (found by walking the live app) ===== */
/* 1 · content was being clipped behind the fixed bottom nav — the last card of every
      screen was unreadable. This is the single most-hit defect in the app. */
body{padding-bottom:calc(112px + env(safe-area-inset-bottom))!important}
/* 2 · sticky header was covering anchored content on jump */
.view{scroll-margin-top:78px}
/* 3 · touch targets below 44px fail on a phone mid-workout, gloves or sweat */
.btn{min-height:44px;display:inline-flex;align-items:center;justify-content:center}
.btn.sm{min-height:36px}
.setdot{width:30px;height:30px}
#nav button{min-height:56px}
/* 4 · keyboard + switch-control users had no visible focus anywhere (a11y gap) */
:focus-visible{outline:2px solid var(--amber);outline-offset:2px;border-radius:6px}
.btn:focus-visible,.setdot:focus-visible{outline:2px solid var(--amber);outline-offset:3px}
/* 5 · every number in the app now aligns on the same width — mixed-width digits
      made the stat rail and tables read as sloppy at a glance */
.sb-n,.pc-v,.stat .v,.exwt-n,.mono,table td,.setct{font-variant-numeric:tabular-nums;
  font-feature-settings:"tnum" 1}
/* 6 · desktop was a narrow column stranded in a dark field */
@media (min-width:1000px){
  main{max-width:1080px;padding:40px 32px 16px}
  .t2col{display:grid;grid-template-columns:1.15fr .85fr;gap:0 44px;align-items:start}
  .t2col>*{min-width:0}
  #nav{width:520px;border-radius:14px 14px 0 0}
}
/* 7 · the priority body copy ran the full width and became hard to track */
.prio .w,.note{max-width:62ch}
/* 8 · long values (school names, notes) overflowed their rows */
.grow,.exname,.pc-name{overflow-wrap:anywhere}
/* 9 · disabled/complete states relied on opacity alone (invisible to some users) */
.exrow.is-done .exname::after{content:' — done';font-size:10px;letter-spacing:.14em;color:var(--faint)}
/* 10 · motion respected, and no layout shift when the display font loads */
@media (prefers-reduced-motion:reduce){.view.on{animation:none}}
.pc-name,.sb-n,.exname{font-display:swap}
</style>

  {"n": 2, "cat": "START", "title": "You made a mistake in a game and the coach is screaming.", "do": "BOUNCE (5 sec): Get up. Don't touch helmet. Don't look at sideline. Don't show frustration. FIX (next rep): Coach corrects you on sideline. Eye contact. 'Yes coach.' Visualize the correction. Execute on next snap. FLUSH (after game): Only AFTER the game do you review the mistake on film. Understand WHY. Physical error means reps fix it. Mental error means film fixes it. Write it down.", "why": "Coaches grade body language between plays more than the play itself. The kid who sulks gets buried. The kid who fixes next rep earns PT."},
  {"n": 3, "cat": "START", "title": "You're dressing varsity but not playing.", "do": "You are ONE PLAY AWAY. That is not a cliche. If the starting LB goes down, you are in. Stand with your position group (not with friends). Watch the starter EVERY series. Pre-snap checks. Drops. Alignment. When he comes off the field ask 'What are you seeing out there?' Stay warm for 4 quarters. Jog the sideline. Light shuffles. If you get called in cold, you will pull something.", "why": "Most freshmen who never play varsity are the ones who weren't mentally ready when called. The ones who get in and play well are remembered."},
  {"n": 4, "cat": "START", "title": "You got beat on a play and gave up a TD.", "do": "1. Play is over in 5 sec. Breathe. 'Next play.' 2. Don't avoid your coach. Make eye contact. Nod when he corrects. Fix it next rep. 3. Don't apologize to teammates. Don't make excuses. They have been beat before too. They don't care that you got beat. They care whether you give up or keep fighting. 4. After game: watch play on film. Why did you get beat? Wrong gap? Wrong angle? Bad tackle technique? Identify cause. Fix before Monday practice. 5. Next time same situation: ready.", "why": "Every D1 player has been beat for a TD. How they respond is what separates starters from backups."},
  {"n": 5, "cat": "START", "title": "An upperclassman is messing with you.", "do": "1. Do not react emotionally. Upperclassmen test freshmen to see who can handle pressure. If you get angry, cry, or complain to coaches, you fail the test. 2. Kill them with effort. The best response is to outwork them on the field. Be first in every line. Hit harder than they do. Never complain. Let your play talk. 3. If it crosses into bullying, harassment, or anything physical/dangerous: tell your parents. Tell your position coach. You do NOT have to tolerate abuse. 4. Build relationships with helpful upperclassmen. Ask questions. Learn.", "why": "Hazing is a real thing but the worst version dies in college programs. Coaches grade who handles adversity."},
  {"n": 6, "cat": "INJURY", "title": "You're injured and can't practice.", "do": "1. Communicate with athletic trainer daily. Know diagnosis. Know timeline. Follow rehab EXACTLY. 2. Attend every practice. Even if you can't participate. Stand with position group. Watch drills. Take mental reps. Visualize executing. 3. Increase film study to 30 min/day. You have extra time. Use it. Watch your own game film. Watch the opponent. Watch college LBs. 4. Do what you CAN do. Upper body injury means lower body work. Lower body injury means upper body work. If you can move ANY part of your body, train that part. 5. Do NOT rush your return. Coming back 2 weeks early and re-injuring equals 6 more weeks. Trust trainer's timeline.", "why": "Injured athletes who stay engaged come back stronger. Athletes who disappear come back rusty AND risk re-injury."},
  {"n": 7, "cat": "START", "title": "You're thinking about quitting.", "do": "1. This feeling is normal. It does not mean you don't love football. It means you're human and the season is grinding. 2. Do NOT make the decision on a bad day. Wait 48 hours. Sleep on it. Eat a good meal. Then decide. Most 'I want to quit' feelings pass after a good night's sleep and a good practice. 3. Talk to someone who has been there. Your dad. Your wrestling coach. An older athlete you respect. They have all wanted to quit at some point. 4. Remember why you started. D1 linebacker. December 17, 2030. Every rep between now and then matters. Quitting today means you gave up on that goal. 5. If you truly, deeply do not want to play football: that's okay. Make the decision from CLARITY not exhaustion. Finish the season. Then decide.", "why": "Every athlete has wanted to quit. The ones who finished won more than they realized at the time."},
  {"n": 8, "cat": "INJURY", "title": "Coach screams at you in practice.", "do": "Response: 'Yes coach.' Eye contact. That's it. Do NOT: explain, defend, argue, roll your eyes, look at teammates, mumble. Next rep: execute the correction VISIBLY. Coaches scream because they care. The kid who absorbs correction equals the kid who plays.", "why": "This is a test. Every kid in the program watches how you respond. Respond right and you earn respect from teammates AND coaches."},
  {"n": 9, "cat": "INJURY", "title": "You get subbed out mid-drive.", "do": "Helmet stays ON. Walk to sideline with shoulders BACK. Stand near position coach. Watch the field, NOT the bench. When the kid who replaced you makes a play: CHEER for him. Visibly. When position coach is free: 'Coach, what do I need to do better?' Get the answer. Memorize. Execute on next snap. Body language coaches notice: kid who pouts gets pulled LONGER. Kid who supports gets put back in FASTER.", "why": "The bench is a visible test. Your teammates are watching. The coach is watching."},
  {"n": 10, "cat": "HEAT", "title": "It's 100F and two-a-days week 1.", "do": "Pre (T-3hr): 24oz water + real meal (chicken rice greens). Pre (T-1hr): 16oz water + electrolytes (LMNT or quarter tsp salt + lemon + Gatorade). During: sip 6-8oz every 15-20 min. Between (2hr break): 32oz water + protein shake + real meal. Lie down in AC for 20 min. After PM: weigh yourself. 16-24oz water per lb lost. Heat exhaustion signs: cold/clammy skin, weak pulse, dizziness, cramps means TELL TRAINER NOW. Heat stroke: hot DRY skin, confusion, body temp 104+ means CALL 911 + cold immersion immediately.", "why": "Heat illness kills HS players every summer. Henderson NV gets 100-115F. This isn't Texas, this is dry heat that masks dehydration until it's too late."},
  {"n": 11, "cat": "HEAT", "title": "Friday night 1-3 record mid-season.", "do": "Mental: season is NOT over. Reset weekly. Each game is its own season. Team meeting: stand up. Be vocal. 'We're 1-3 because of X, Y, Z. Here's what we fix this week.' Even as a freshman. Practice: show up Monday like it's game day. Energy fixes a losing locker room faster than scheme changes. Game time: play for the LB next to you, not the scoreboard. Effort + execution equals your only job.", "why": "Half the league goes through this every year. Teams that recover equals playoff teams. Teams that don't equals season's over by Week 6."},
  {"n": 12, "cat": "INJURY", "title": "You sprain an ankle week 3.", "do": "Day 1: RICE protocol. Ice 20 min on / 20 min off. Compression wrap. Elevation above heart. Tell trainer. Day 2-3: continue RICE. Alphabet drill 3x daily (trace letters with big toe). Calf raises (seated) 3x15. Day 4-7: single-leg balance 30s x 5. Resistance band 4-directions (inversion, eversion, dorsi, plantar) 2x15 each. Week 2: return to running. Tape ankle for first 2 weeks back. Re-sprain rate equals 3x if you skip tape. Communication: stay engaged with team. Sit in on film. Help younger LBs with reads.", "why": "Ankle sprains are the most common football injury. Re-sprain rate is 3x without tape. Easy prevention."},
  {"n": 13, "cat": "HEAT", "title": "Wrestling season starts and football peers pressure you to quit it.", "do": "Reality check: wrestling IS your football superpower. Hand-fighting. Leverage. Mat awareness. Contact comfort. You do NOT quit wrestling for football. Multi-sport athletes get recruited at HIGHER rates than single-sport. College coaches prefer them. Adjust football maintenance: 1 lift/wk during wrestling season. 3x3 squat + bench at 80%. Hip mobility daily (wrestling shortens hips). Tell football coach: 'I will be on the mat Dec-Feb. I will do football maintenance lifts on Sundays. I will be back at 100% for spring ball.' That's a pro answer.", "why": "D1 coaches LOVE multi-sport athletes. Walking away from wrestling equals walking away from your recruiting advantage."},
  {"n": 14, "cat": "PEER", "title": "Teammate offers you weed at a party.", "do": "Answer: 'Nah I'm good.' Then walk away. Don't lecture. Don't moralize. Don't make a scene. Just decline and leave. Truth: THC degrades REM sleep by 30-40% for 24+ hours after use. REM is when growth hormone releases. One weekend of weed equals a week of stunted recovery. Compounds over a season. NCAA testing: THC IS tested. Positive equals suspension at most programs. Your D1 dream ends. Bigger truth: the kids who say no consistently end up at the parties of the kids who said yes, except they're celebrating signing day.", "why": "Single moment. Permanent consequence. Don't risk 1,500 days of work for one weekend."},
  {"n": 15, "cat": "PEER", "title": "Girlfriend drama is destroying your focus.", "do": "Direct truth: any relationship that drains your focus during HS football season costs you reps coaches notice. Decision matrix: Does she support your training schedule? Keep. Does she complain when you can't hang out 6 days/week? Talk it out. Does drama from her affect your sleep/film/lifting? Reset boundaries. Does it require you to skip workouts/film/camps? End it. This is not romantic advice. This is PERFORMANCE advice. The right partner accelerates your path. The wrong one ends it.", "why": "Distraction compounds. A bad week of sleep + missed film + missed lift session equals measurable performance drop. Coaches grade it."},
  {"n": 16, "cat": "RECRUIT", "title": "No offers by Thanksgiving senior year.", "do": "Don't panic. 60% of D1 commitments happen in SPRING of senior year. Phase 1 (Nov): Email blitz. 50 coaches across all 4 levels. Subject line: '2030 LB Update [Last Name]'. Phase 2 (Dec): Early Signing Day passes without you. NOT THE END. Many programs save scholarships for Feb. Phase 3 (Jan): Open conversations with FCS + D2 hard. Multiple offers usually emerge. Phase 4 (Feb): National Signing Day target equals PWO at G5 + JUCO backup. Both produce D1 careers. The work isn't done. Senior film keeps producing. Combine retesting matters. Window stays open until April.", "why": "The NCAA signing window stays open for months after Thanksgiving. Most signings happen in Feb-March."},
  {"n": 17, "cat": "RECRUIT", "title": "Coach gets fired mid-recruiting.", "do": "Reality: coaching changes happen. Position coach who recruited you may leave. HC who offered you may get fired. Immediate: reach out to recruiting coordinator (different person than position coach). 'Coach, what's my status with the program going forward?' Get the answer IN WRITING. Re-evaluate: the new staff may not recruit your position the same way. They may want a different body type. Verbal commitments are not binding. You can de-commit if the fit changes. Inform the new staff respectfully. Stay in the portal mindset even before college. Programs change. Be ready.", "why": "Verbal commits evaporate when staff changes. This is rare but happens. Don't tie your identity to one staff."},
  {"n": 18, "cat": "PEER", "title": "A friend who's better than you gets an offer before you.", "do": "Normal. Doesn't mean anything about your ceiling. They played a different role on their team. They got seen by the right coach at the right time. They had a better highlight film. They got lucky on a measurables day. You will have your moment. Don't compare timelines. Don't hate. Be happy for them, that energy comes back. Keep stacking days. The offer you get in 2029-2030 will be THE offer. Not theirs.", "why": "D1 offers are timing-dependent. Your timeline is yours. Stay locked in."},
  {"n": 19, "cat": "PEER", "title": "Friend quits the team.", "do": "1. Don't follow. Their reasons are theirs. Yours are yours. 2. Don't trash-talk them to other teammates. That ages badly. 3. Don't feel guilty for staying. You're not responsible for their choice. 4. Notice if other teammates seem shaken. Be the steady one. Talk to your HC: 'How do we want to handle this as a team?' Show leadership. 5. If you feel your own motivation wobbling because of it, re-read the North Star and talk to your sponsor or coach.", "why": "Quits ripple through teams. Be the steady one. The coach notices who doesn't waver."},
  {"n": 20, "cat": "PEER", "title": "You get cut from a camp.", "do": "Normal. Common. Camp rosters are limited. Coaches have favorites already. Email another school. Apply to 2 more camps that week. Rejection is normal. Reach out MORE, sit back LESS.", "why": "D1 camps reject 80% of applicants. It means nothing about your ceiling."},
  {"n": 21, "cat": "RECRUIT", "title": "Sponsor pulls funding.", "do": "Stay grateful. Don't beg. Ask 'what would change your mind?' If permanent: keep going. JUCO is real. Walk-on is real. You're not done. The plan isn't dependent on one person's money. Your work ethic is independent. Your body is independent. Your film is independent. Most D1 players DON'T have family money backing them. The dream survives without sponsor.", "why": "Half the D1 roster is walk-ons or partial-scholarship. Money doesn't make you a D1 athlete. Your work does."},
  {"n": 22, "cat": "PEER", "title": "Coach says you're not ready for varsity.", "do": "Ask 'What do I need to work on to be ready?' Get specific. 'You need to add 10 lb, drop your 40 by 0.2s, and learn the full LB playbook.' That's actionable. Work it. Re-ask in 4 weeks. Show progress. Earn the spot. JV is a TEMPORARY stop, not a permanent label. Most multi-year D1 starters spent JV time. Don't sulk, train.", "why": "JV year builds depth. Many D1 LBs were 2-way starters who spent freshman year on JV."},
  {"n": 23, "cat": "PEER", "title": "Negative press / drama at school.", "do": "Stay off social media for 48 hours. Talk to parents. Wait it out. Don't post anything until calm. Coaches notice who handles public attention with maturity. One bad social post equals lost offers. This is not the moment to defend yourself publicly. Let it die.", "why": "Every D1 program monitors social media. One bad post equals lost offer."},
  {"n": 24, "cat": "RECRUIT", "title": "You get an offer from a D1 school you didn't expect.", "do": "Don't commit on the spot. Thank coach. Tell parents + sponsor + head coach. Take 1 week to decide. Visit campus first. Ask 5-7 of the questions from Coach Interview Q&A. Talk to current players. Sleep on it. The offer is real. But a rushed decision at 15 on something you will live with for 4 years equals bad idea.", "why": "Decisions made in 24 hours are decisions you will regret for 4 years."},
  {"n": 25, "cat": "INJURY", "title": "Concussion symptoms after a hit.", "do": "Tell coach + parents IMMEDIATELY. See doctor within 48 hrs. NEVER play through suspected concussion. RICE protocol + sponsor-paid PT if needed. Use SCAT6 checklist (in SAFETY tab). 6-step Return-to-Play protocol. No same-day return. Period.", "why": "Second-impact syndrome equals catastrophic. CTE is real. One game isn't worth your brain."},
  {"n": 26, "cat": "HEAT", "title": "Cramping in summer practice.", "do": "Stop. Sit. Stretch the cramped muscle. Sip water with electrolytes (NOT plain water, need Na). Tell trainer. 5-10 min rest. If cramping is severe equals day off. Cramping is your body saying sodium is low + you pushed too hard. Tomorrow: salt-load breakfast (eggs + LMNT).", "why": "Cramping is preventable. Coaches grade who manages it."},
  {"n": 27, "cat": "START", "title": "You score your first varsity TD.", "do": "Celebrate with your teammates. Spike the ball sparingly. Hand it to the ref. Run back to the huddle. Don't draw attention. Coaches grade who celebrates the team vs who celebrates themselves. The team that scores often is the team that prepares quietly. After game: 'Thanks to the OL who blocked for me.' Credit them every single time.", "why": "First TD equals memorable moment. How you celebrate equals grades your character."},
  {"n": 28, "cat": "RECRUIT", "title": "Coach Cahill praises you in front of the team.", "do": "Say 'Thank you coach.' Keep working. Don't get comfortable. Praise from your HC means: he's noticed. Now he expects consistency. The trap is reading your own press. Same thing NFL rookies fall into. Stay the same person. Same work. Next day.", "why": "Praise is feedback. The response determines whether more comes."},
  {"n": 29, "cat": "RECRUIT", "title": "A D1 coach you emailed personally responds.", "do": "Reply within 24 hours. Polite. Short. Professional. Full sentences. 'Thank you Coach [Last Name]. I would love to be on your board at [School]. Here is my updated Hudl: [link]. My coach contact: Coach Cahill, [email], [phone]. When would be a good time to call?' Ask: 'What is the next step?' Camp invite? Questionnaire? Phone call? Don't promise anything. Don't commit. Just engage and gather info.", "why": "Coach responsiveness is a recruiting signal. Quick professional reply equals serious recruit."},
  {"n": 30, "cat": "HEAT", "title": "Last play of the game. You're exhausted. Tie score.", "do": "This is what you trained for. 4-7-8 breath. Cue word: 'FINISH.' Lower pads. One play. Execute. After: walk off the field with shoulders back regardless of outcome. You earned this moment. Post-game: shake hands. Find parents in stands. Tell sponsor. Journal: 'What did I learn about myself tonight?' Carry it forward.", "why": "The biggest moments come when you're most tired. How you respond equals who you are."},
];

/* In-season week is computed around game day (settings.gameDay, default Fri=5).
   Heavy ≥96h pre-game, power ≥48h pre-game (research: maintain with 2×/wk high-int low-vol). */
function inseasonWeek(gameDay){
  const g=gameDay??5, wrap=n=>((n%7)+7)%7;
  const days={};
  days[wrap(g-4)]={title:'IN-SEASON HEAVY',blocks:[
    {n:'Back squat',s:'3×3 @ 85% — 45 min, in and out',pct:.85,lift:'squat'},
    {n:'Bench press',s:'3×3 @ 85%',pct:.85,lift:'bench'},
    {n:'RDL',s:'2×6'},
    {n:'Neck 4-way',s:'2×15 — every week of contact season'}]};
  days[wrap(g-2)]={title:'IN-SEASON POWER',blocks:[
    {n:'Why this day is short',s:'2×/wk heavy-but-brief KEEPS strength in-season (research-backed). Volume today = slow Friday = worse film. The discipline is leaving.'},
    {n:'Box jump',s:'4×3 · max intent, fully fresh — vert work continues all season at low dose'},
    {n:'Bench press (speed)',s:'4×2 @ 65% — bar speed only',pct:.65,lift:'bench'},
    {n:'Chin-up',s:'2×6'},
    {n:'Neck 4-way',s:'2×15 · 30 minutes total, out the door'}]};
  days[g]={title:'GAME DAY',recovery:true,blocks:[
    {n:'Pre-game visualization',s:'5-min script (PUSH) — locker room'},
    {n:'Fuel',s:'Real breakfast + lunch · water all day · no experiments'},
    {n:'After',s:'Log carries/tackles in TRACK notes while it\'s fresh'}]};
  days[wrap(g+1)]={title:'POST-GAME RECOVERY',recovery:true,blocks:[
    {n:'EOS recovery suite or easy walk',s:'30 min'},
    {n:'Watch your own game film',s:'5-question framework on YOUR plays — this is how film habits start'}]};
  return [0,1,2,3,4,5,6].map(d=>({day:d,...(days[d]||{title:'PRACTICE DAY',recovery:true,blocks:[
    {n:'Team practice is the work today',s:'Show up early. Effort shows on film even in practice.'},
    {n:'Mobility 10 min at night',s:'Hips + ankles while watching TV'}]})}));
}

/* deterministic entry id: content hash + nth-occurrence-of-identical-content. Two devices
   holding the same history derive the same ids without coordination. */
function entHash(str){ let h=5381; for(let i=0;i<str.length;i++) h=((h<<5)+h+str.charCodeAt(i))>>>0; return h.toString(36); }
function entKey(x){ const c={}; for(const k in x) if(k!=='id') c[k]=x[k]; return JSON.stringify(c); }
function normIds(s){
  for(const k of SYNC_APPEND){
    const arr=s[k]; if(!Array.isArray(arr)) continue;
    const occ={};
    for(const x of arr){
      if(!x||typeof x!=='object') continue;
      const key=entKey(x); const n=occ[key]||0; occ[key]=n+1;
      if(!x.id) x.id='e'+entHash(key)+(n?'.'+n:'');
    }
  }
  return s;
}

/* ============ CLOUD SYNC (v7.32) ============
   Three devices, one athlete, one truth. Design honors the one law: state is facts and
   events, so merge is defined per ownership class, never blanket last-write-wins:
   - append-only arrays  → union by persistent deterministic id (nothing logged is ever lost)
   - checkins/sessions   → element-wise OR (done anywhere = done)
   - pipeline entities   → per-entity latest write (mu stamped on change)
   - prs/profile/settings/params → per-group latest write (meta.mod stamped on change)
   - void events carry the target id → applied idempotently on every device

function mergeStates(a,b){

  for(const k of SYNC_APPEND){
    const seen={}, seenCk={}, out=[];
    for(const x of (a[k]||[]).concat(b[k]||[])){

      if(seen[x.id]) continue;
      if(k==='recs'){ const ck=entKey(x); if(seenCk[ck]) continue; seenCk[ck]=1; } // engine recs: same content ⇒ same rec, uid notwithstanding
      seen[x.id]=1; out.push(structuredClone(x));
    }
    out.sort((x,y)=>((x&&x.d)||'')<((y&&y.d)||'')?-1:((x&&x.d)||'')>((y&&y.d)||'')?1:0);
    m[k]=out;

  const voided={};
  for(const e of m.events) if(e.type==='void'&&e.meta&&e.meta.id) voided[e.meta.id]=1;
  m.lifts=m.lifts.filter(x=>!voided[x.id]);

  m.core=(m.core||[]).filter(x=>!voided[x.id]);   // v7.41: corrections apply everywhere
  m.games=(m.games||[]).filter(x=>!voided[x.id]);

  for(const k of SYNC_KEYED){
    const A=a[k]||{}, B=b[k]||{}, out={};

      if(x&&y){ const n=Math.max(x.length,y.length); out[key]=Array.from({length:n},(_,i)=>!!((x[i])||(y[i]))); }

  const byId={};
  for(const p of a.pipeline||[]) byId[p.id]=p;
  for(const p of b.pipeline||[]){ const q=byId[p.id]; if(!q||(p.mu||0)>(q.mu||0)) byId[p.id]=p; }
  m.pipeline=Object.keys(byId).map(id=>structuredClone(byId[id]));

  const ma=(a.meta&&a.meta.mod)||{}, mb=(b.meta&&b.meta.mod)||{};
  m.meta={mod:{}};

}

    const three=iso=>{ const c=day(iso); return !!c&&c.filter(Boolean).length===3; };

/* ============ KNOWLEDGE ENGINE (v7.18) — the accumulation layer ============
   D1 OS stops re-solving the same question by turning paired observations into permanent
   KNOWLEDGE OBJECTS. This is a PURE function of the append-only log (metrics/checkins/notes),
   so knowledge (a) can never be fabricated, (b) can never drift from evidence, (c) survives
   any UI redesign, and (d) is exported with the data — the log IS the permanent memory.
   Contradictions are never overwritten: every observation stays in the log and is re-counted

  // the evidence than a median split and degrades honestly when signals tie.
  let support=0, contra=0;

  else if(decisive===0){ status='insufficient'; conf='Insufficient — no variation to test yet'; }
  else if(strength>=0.5&&nDays>=CONFIRM){ status='confirmed'; conf=`Consistent — ${support}/${decisive} day-comparisons agree across ${nDays} days`; }
  else if(strength>=0.5){ const more=CONFIRM-nDays; status='emerging'; conf=`Emerging — ${support}/${decisive} comparisons agree, ${more} more day${more===1?'':'s'} to confirm`; }
  else if(strength<0.25){ status='none'; conf=`No detectable relationship — ${support}/${decisive} comparisons agree`; }
  else { status='testing'; conf=`Mixed so far — ${support}/${decisive} comparisons agree, still testing`; }

/* ============ POLICY LAYER (v7.20) — the constitutional bridge between knowledge and action ====
   Pure functions. Proposals are DERIVED from evidence every time (never stored — the one law);

   Any future engine that wants to change behavior emits a proposal object through policyEval.
   The policy outlives the engines. */
function policyObsCount(s=S){ return (s.metrics||[]).length+(s.lifts||[]).length+Object.keys(s.checkins||{}).length+(s.pushLog||[]).length; }
function policyBar(s=S){
  const n=policyObsCount(s);
  const bar=[...POLICY.bars].reverse().find(b=>n>=b.minObs)||POLICY.bars[0];
  return {...bar, obs:n,
    note:`${n} real observations on record — the system is ${bar.label}. A behavior change now needs ${bar.needFollowed} followed + ${bar.needIgnored} skipped graded days, spread over ${bar.needWeeks}+ distinct weeks spanning ${bar.needSpanDays}+ days, with at most ${Math.round(bar.maxContra*100)}% contradicting evidence. The bar rises as evidence accumulates — the system gets more stable, never more reactive.`};

/* fixed 7-day bins since epoch — 'distinct calendar weeks' for the overfit check */
function weekBin(d){ return Math.floor((new Date(d+'T12:00').getTime()/864e5+4)/7); }

   followed,ignored (GRADED days),evDates,reason,expected,unknowns,explain. Nothing hidden. */
function policyEval(p,s=S){
  const bar=policyBar(s);
  const days=(p.evDates||[]).slice().sort();
  const span=days.length>1?daysBetween(days[0],days.at(-1)):0;
  const weeks=new Set(days.map(weekBin)).size;
  const tot=(p.support||0)+(p.contra||0);
  const contraShare=tot>0?p.contra/tot:null;
  const Q=[];
  const q1=p.followed>=bar.needFollowed&&p.ignored>=bar.needIgnored;
  Q.push({id:'sufficient',pass:q1,note:q1
    ?`${p.followed} followed + ${p.ignored} skipped graded days — meets the ${bar.label} bar (${bar.needFollowed}+${bar.needIgnored}).`
    :`${p.followed} followed + ${p.ignored} skipped graded days; the ${bar.label} bar is ${bar.needFollowed}+${bar.needIgnored}. Not demonstrably sufficient.`});
  const q2=contraShare!=null&&contraShare<=bar.maxContra;
  Q.push({id:'contradictions',pass:q2,note:contraShare==null
    ?'No contradiction count present — rejected: unexamined contradiction is hidden uncertainty.'
    :`${p.contra} of ${tot} evidence points disagree (${Math.round(contraShare*100)}%; bar allows ${Math.round(bar.maxContra*100)}%). Contradictions counted, never erased.`});
  const q3=span>=bar.needSpanDays;

    ?`Evidence spans ${span} days — a pattern, not a reaction to this week.`
    :`Evidence spans only ${span} days (needs ${bar.needSpanDays}) — acting on it would be reacting to recent observations, not learning.`});

    ?`Seen across ${weeks} distinct weeks — not one short period.`
    :`All evidence sits in ${weeks} distinct week${weeks===1?'':'s'} (needs ${bar.needWeeks}) — could be one short period. Delayed, not rejected: keep logging.`});

    :'Proposal is missing evidence-derived fields — rejected.'});

}
/* revisions(s) — the FIRST consumer of the policy layer. Generates candidate behavior changes

   kind of change (demote/restore a rec kind in the ONE THING ladder); future engines add
   generators here — the policy above never changes shape. */
function revisions(s=S){
  const effs=(typeof recEffectiveness==='function')?recEffectiveness(s):[];
  const demoted=(s.params&&s.params.demotedRecs&&s.params.demotedRecs.v)||[];
  const med=a=>{const b=[...a].sort((x,y)=>x-y),k=b.length;return k?(k%2?b[(k-1)/2]:(b[k/2-1]+b[k/2])/2):null;};
  const out=[];
  for(const e of effs){
    if(!e.pairs||!e.pairs.f.length||!e.pairs.i.length) continue;
    const mi=med(e.pairs.i.map(x=>x.v));
    const helped=e.pairs.f.filter(x=>x.v-mi>=0.5).length;     // followed days where the advice looked like it helped
    const flat=e.pairs.f.length-helped;                        // followed days consistent with "no benefit"
    const evDates=[...e.pairs.f,...e.pairs.i].map(x=>x.d);
    const base={kind:e.kind,param:'demotedRecs',followed:e.pairs.f.length,ignored:e.pairs.i.length,evDates};
    let p=null;
    if(e.effect==='none'&&!demoted.includes(e.kind)){
      p=policyEval({...base,id:'demote:'+e.kind,
        current:`"${e.label}" can be prescribed as TODAY'S ONE THING`,
        proposed:`Stop prescribing "${e.label}" as the ONE THING — the ladder falls through to the next real priority`,
        support:flat,contra:helped,
        reason:e.detail,
        expected:'The daily priority stops spending your attention on advice your own outcomes graded as no-effect.',
        unknowns:'A longer season, better logging, or a changed context could reverse this. The grade keeps updating and this change is reversible through the same policy.',
        explain:`Your own log graded "${e.label}" as having no measurable effect: ${e.detail}`},s);
    } else if(e.effect==='supported'&&demoted.includes(e.kind)){
      p=policyEval({...base,id:'restore:'+e.kind,
        current:`"${e.label}" is demoted out of the ONE THING ladder`,
        proposed:`Restore "${e.label}" as an eligible ONE THING`,
        support:helped,contra:flat,
        reason:e.detail,
        expected:'Advice your outcomes now support returns to the daily priority.',
        unknowns:'The earlier no-effect grade came from real days too — both records are kept; neither is erased.',
        explain:`Your own log now grades "${e.label}" as supported: ${e.detail}`},s);
    }
    if(!p) continue;
    /* a rejection is permanent FOR THIS EVIDENCE — identical evidence never resurfaces; new evidence may */
    const fp=`${p.support}✓/${p.contra}✗ over ${evDates.length} graded days`;
    p.fingerprint=fp;

/* ============ CALIBRATION LAYER (v7.21) — the system measures its OWN reasoning ============

function stateAt(s,dateISO){

function calLabel(key){

/* belief timeline: what the system concluded at each date evidence landed */
function beliefTimeline(s=S){

  for(const d of days) (lower.has(addDays(d,-1))?after:other).push(pq[d]);
  const med=a=>{const b=[...a].sort((x,y)=>x-y),k=b.length;return k?(k%2?b[(k-1)/2]:(b[k/2-1]+b[k/2])/2):null;};
  if(after.length<4||other.length<4) return {status:'insufficient',
    note:'No recovery claims yet — needs '+Math.max(0,4-after.length)+' more practice ratings the day after heavy lower lifts and '+Math.max(0,4-other.length)+' more on other days. Rate practices 1–5 in Quick Log.'};
  const diff=med(after)-med(other);
  if(diff<=-1) return {status:'read',penalty:true,
    note:'Practice quality median '+med(after)+' the day after heavy lower lifts vs '+med(other)+' otherwise ('+after.length+'/'+other.length+' rated days) — your evidence says move squat/dead further from practice.'};
  return {status:'read',penalty:false,
    note:'No lower-day penalty in your data: '+med(after)+' after vs '+med(other)+' otherwise ('+after.length+'/'+other.length+' rated days).'};
}

/* Career archive: every season derivable forever from the append-only log */
function careerArchive(s=S){
  const yr=d=>{ const y=+d.slice(0,4); return d.slice(5,7)>='08'?y:y-1; };
  const years={};
  const touch=(d,f)=>{ const y=yr(d); years[y]=years[y]||{checkins:0,lifts:0,prs:0,corrections:0,clips:0,contacts:0,missions:0,best:{}}; f(years[y]); };
  Object.keys(s.checkins||{}).forEach(d=>touch(d,x=>x.checkins++));
  (s.lifts||[]).forEach(l=>touch(l.d,x=>{ x.lifts++; const e=epley(l.wt,l.reps); if(!x.best[l.ex]||e>x.best[l.ex]) x.best[l.ex]=e; }));
  (s.coach||[]).forEach(c=>touch(c.d,x=>x.corrections++));
  (s.clips||[]).forEach(c=>touch(c.d,x=>x.clips++));
  (s.events||[]).forEach(e=>{ if(e.type==='pr') touch(e.d,x=>x.prs++); if(e.type==='contact') touch(e.d,x=>x.contacts++); if(e.type==='mission') touch(e.d,x=>x.missions++); });
  const grade=y=>({2026:'Freshman',2027:'Sophomore',2028:'Junior',2029:'Senior'})[y]||y;
  return Object.keys(years).sort().map(y=>({year:y+'–'+(+y+1)%100,grade:grade(+y),...years[y]}));
}

/* ONE bottleneck — explicit precedence, and the consensus of systems pointing at it */
function gapBottleneck(s=S,today=todayISO()){
  const {factors,stage}=gapEngine(s,today);
  const by=id=>factors.find(f=>f.id===id);
  const lim=t=>factors.filter(f=>f.tier===t);
  const speedUnknown=['forty','vert','broad'].filter(k=>{const f=by('phys:'+k);return f&&f.tier==='UNKNOWN';});
  let pick=null, consensus=[];
  if(by('gpa')&&by('gpa').tier==='LIMITING'){ pick=by('gpa'); consensus=['decide() priority slot seized','Academic Eligibility card','Recruiting Ops open item']; }
  else if(by('health')&&by('health').tier==='LIMITING'){ pick=by('health'); consensus=['Trainer log 14-day pattern','availability gates every other factor']; }
  else if(speedUnknown.length>=2){ pick=by('phys:forty')||by('phys:'+speedUnknown[0]);
    consensus=['Experiment Engine ranks the baseline test #1','waypoint targets uncomputable without it','radar speed axes empty','D1 percentile unreadable']; }
  else if(by('film')&&by('film').tier==='LIMITING'){ pick=by('film'); consensus=['Recruiting Ops open item','recruiting one-pager has no link','Film Room empty']; }
  else if(by('coachwork')&&by('coachwork').tier==='LIMITING'){ pick=by('coachwork'); consensus=['Coach Memory most-repeated','practice mission already targets it']; }
  else if(lim('LIMITING').some(f=>f.domain==='physical')){
    pick=lim('LIMITING').filter(f=>f.domain==='physical').sort((a,b)=>(a.progress??1)-(b.progress??1))[0];
    consensus=['waypoint gap engine primary','focus block targets it in TRAIN']; }
  else if(by('consistency')&&by('consistency').tier==='LIMITING'){ pick=by('consistency'); consensus=['System Read adherence','streak engine']; }
  else if(lim('LIMITING')[0]){ pick=lim('LIMITING')[0]; consensus=['Recruiting Ops checklist']; }
  else if(lim('UNKNOWN')[0]){ pick=lim('UNKNOWN')[0]; consensus=['Experiment Engine — unknowns before optimization']; }
  else { pick=lim('COMPETITIVE').sort((a,b)=>(a.progress??1)-(b.progress??1))[0]||null; consensus=pick?['closest competitive factor to the '+stage+' waypoint']:[]; }
  return pick?{...pick,consensus}:null;
}
/* Am I closing the gap? — replayed, never remembered */
function gapTrend(s=S,today=todayISO(),back=28){
  const past=stateAt(s,addDays(today,-back));
  const cnt=fs=>({lim:fs.filter(f=>f.tier==='LIMITING').length,unk:fs.filter(f=>f.tier==='UNKNOWN').length,rdy:fs.filter(f=>f.tier==='READY').length});
  const a=cnt(gapEngine(past,addDays(today,-back)).factors), b=cnt(gapEngine(s,today).factors);

    note:back+' days ago: '+a.lim+' limiting / '+a.unk+' unknown / '+a.rdy+' ready → today: '+b.lim+' / '+b.unk+' / '+b.rdy+(moved.length?' · moved: '+moved.map(x=>x.name+' '+x.from+'→'+x.to).join(', '):' · no tier changes yet')};

/* PEAK 14 read (v7.28): day counter, phase, test windows A/B, measured deltas when both exist */
function peak14Read(s=S,today=todayISO()){
  if(today<PEAK14.start||today>addDays(PEAK14.end,2)) return null;
  const day=daysBetween(PEAK14.start,today)+1;
  const inWin=(d,anchor)=>Math.abs(daysBetween(anchor,d))<=1;   // test valid on the day or ±1
  const read=anchor=>{ const out={};
    for(const [k] of PEAK14.tests){
      const hits=(s.metrics||[]).filter(x=>x.key===k&&inWin(x.d,anchor)).sort((a,b)=>a.d<b.d?-1:1);
      if(hits.length) out[k]=hits[hits.length-1].val; }
    return out; };
  const A=read(PEAK14.testA), B=read(PEAK14.testB);
  const deltas=PEAK14.tests.map(([k,label,unit,lower])=>{
    if(A[k]==null||B[k]==null) return {k,label,unit,a:A[k]??null,b:B[k]??null,delta:null};
    const d=+(B[k]-A[k]).toFixed(2);
    return {k,label,unit,a:A[k],b:B[k],delta:d,better:lower?d<0:d>0}; });
  const phase=today<PEAK14.testA?'pre':today===PEAK14.testA?'testA':today<PEAK14.testB?'build':today===PEAK14.testB?'testB':'review';
  return {day,phase,A,B,deltas,
    aDone:PEAK14.tests.every(([k])=>A[k]!=null), bDone:PEAK14.tests.every(([k])=>B[k]!=null)};
}

/* ============ v7.33 BEAT LAST WEEK — the push engine's single standard ============
   Owner directive (2026-07-17): "pushed me harder and further than anybody possibly could",
   standard chosen: beat last week. Work is COUNTED, never invented — the engine pushes with
   receipts, not pep talks. The bar is the best of the two previous weeks: a lost week never
   lowers the standard, so slack has a price the engine collects automatically. */
function weekStart(d){ const dt=new Date(d+'T12:00'); const dow=(dt.getDay()+6)%7; return addDays(d,-dow); } // Monday
function weekWork(s,startISO){
  let sets=0,iq=0,notes=0,boxes=0,days=0;
  for(let i=0;i<7;i++){ const d=addDays(startISO,i);
    const dsets=(s.lifts||[]).filter(l=>l.d===d).length;
    const sess=((s.sessions||{})[d]||[]).some(Boolean);
    const ck=(s.checkins||{})[d]||[];
    if(dsets||sess||ck[0]) days++;
    sets+=dsets;
    iq+=(s.pushLog||[]).filter(p=>p.d===d).length;
    notes+=(s.notes||[]).filter(n=>n.d===d).length;
    boxes+=ck.filter(Boolean).length;
  }
  return {days,sets,iq,notes,boxes,actions:sets+iq+notes+boxes};
}
function weekLedger(s=S,today=todayISO()){
  const w0=weekStart(today);
  const cur=weekWork(s,w0), w1=weekWork(s,addDays(w0,-7)), w2=weekWork(s,addDays(w0,-14));
  const bar={days:Math.max(w1.days,w2.days),actions:Math.max(w1.actions,w2.actions)};
  const left=6-((new Date(today+'T12:00').getDay()+6)%7);
  const beat=cur.days>bar.days||(cur.days===bar.days&&cur.actions>bar.actions);
  const level=beat?'won':(cur.days+left>=bar.days)?'alive':'lost';
  return {cur,bar,last:w1,left,beat,level};
}
/* consecutive fully-silent days before today — zero logged anything. Fuel for the receipts callout. */
function silentDays(s=S,today=todayISO()){
  let n=0;
  for(let i=1;i<=14;i++){ const d=addDays(today,-i);
    const any=(s.lifts||[]).some(l=>l.d===d)||((s.checkins||{})[d]||[]).some(Boolean)
      ||(s.pushLog||[]).some(p=>p.d===d)||(s.notes||[]).some(x=>x.d===d)
      ||((s.sessions||{})[d]||[]).some(Boolean)||(s.metrics||[]).some(m=>m.d===d);
    if(any) break; n++;
  }
  return n;
}

/* 9 · season report — verified deltas over one season window */
function seasonReport(s=S,from='2026-08-10',to='2026-10-31'){
  const inW=d=>d>=from&&d<=to;

/* 10 · brain-dump parser — messy text in, SUGGESTIONS out. Suggest-and-approve only:
   nothing writes without a tap. Patterns cover how the owner actually writes. */
function dumpParse(txt){
  const out=[]; const t=' '+String(txt||'').toLowerCase()+' ';
  const lifts={bench:'bench',squat:'squat',dead:'dead',deadlift:'dead',clean:'clean'};
  for(const word in lifts){
    let m=t.match(new RegExp('(\\d{2,3})\\s*(?:x\\s*(\\d{1,2})\\s*)?on\\s*'+word))||
          t.match(new RegExp(word+'\\s*(?:at|to|of)?\\s*(\\d{2,3})(?:\\s*x\\s*(\\d{1,2}))?'))||
          t.match(new RegExp('(?:hit|got)\\s*(\\d{2,3})(?:\\s*x\\s*(\\d{1,2}))?\\s*(?:on\\s*)?'+word));
    if(m){ const wt=+m[1],reps=+(m[2]||1);
      if(wt>=45&&wt<=700) out.push({kind:'lift',ex:lifts[word],wt,reps,label:`${lifts[word]} ${wt}×${reps}`}); }
  }
  let m=t.match(/(?:weigh(?:ed|ing)?|bw|bodyweight)\s*(?:at|in at)?\s*(\d{2,3})/)||t.match(/(\d{3})\s*(?:lbs?|pounds)\b/);
  if(m&&+m[1]>=100&&+m[1]<=350) out.push({kind:'metric',key:'wt',val:+m[1],label:`bodyweight ${m[1]} lb`});
  m=t.match(/(\d{2})\s*(?:inch|in|")?\s*(?:standing\s*)?vert/)||t.match(/vert(?:ical)?\s*(?:of|at)?\s*(\d{2})/);
  if(m&&+m[1]>=10&&+m[1]<=50) out.push({kind:'metric',key:'vert',val:+m[1],label:`vertical ${m[1]}"`});
  m=t.match(/(\d\.\d{1,2})\s*(?:forty|40)/)||t.match(/(?:forty|40)[^\d]{0,10}(\d\.\d{1,2})/);
  if(m&&+m[1]>=4&&+m[1]<=7) out.push({kind:'metric',key:'forty',val:+m[1],label:`40yd ${m[1]}s`});
  m=t.match(/slept?\s*(\d{1,2}(?:\.\d)?)/);
  if(m&&+m[1]>=3&&+m[1]<=14) out.push({kind:'metric',key:'sleep',val:+m[1],label:`sleep ${m[1]}h`});
  return out;
}

/* full-log search — four years of notes/clips/coach/opponent, one query */
function searchLog(q,s=S){
  const t=String(q||'').toLowerCase().trim(); if(t.length<2) return [];
  const hit=[];
  (s.notes||[]).forEach(n=>{ if((n.text||'').toLowerCase().includes(t)) hit.push({d:n.d,kind:'note',text:n.text}); });
  (s.coach||[]).forEach(n=>{ if((n.text||'').toLowerCase().includes(t)) hit.push({d:n.d,kind:'coach',text:n.text}); });
  (s.opp||[]).forEach(n=>{ if((n.text+' '+n.opp).toLowerCase().includes(t)) hit.push({d:n.d,kind:'opponent',text:n.opp+': '+n.text}); });
  (s.clips||[]).forEach(c=>{ if((c.tag+' '+(c.note||'')+' '+(c.opp||'')).toLowerCase().includes(t)) hit.push({d:c.d,kind:'clip',text:c.tag+(c.note?' — '+c.note:'')}); });

function recLog(kind,text,ctx){ ctx=ctx||{}; const d=todayISO(); const id='rec:'+d+':'+kind;
  S.recs=S.recs||[]; if(S.recs.some(r=>r.id===id)) return id;
  S.recs.push({id,d,kind,text,why:ctx.why||'',ev:ctx.ev||'',unc:ctx.unc||'',asm:ctx.asm||'',outKey:ctx.outKey||null,win:ctx.win||1,followed:null,followedOn:null});
  save(); return id; }

/* ===== Policy actions (v7.20) — the only door through which knowledge changes behavior.
   The system proposes (revisions), policy evaluates (policyEval), the HUMAN decides here.
   Every decision is recorded forever: an append-only 'policy' event carrying evidence basis,
   approval date, version and reason — a reproducible reasoning history. ===== */
const POLICY_VER='7.20';
function approveProposal(id){
  const p=revisions(S).find(x=>x.id===id);
  if(!p){ toast('Proposal no longer exists — evidence changed'); return; }
  if(p.verdict!=='eligible'){ toast('Policy has not cleared this change'); return; }
  S.params.demotedRecs=S.params.demotedRecs||{v:[],basis:'default'};
  if(p.param==='demotedRecs'){
    S.params.demotedRecs.v = id.indexOf('demote:')===0
      ? [...new Set([...S.params.demotedRecs.v, p.kind])]
      : S.params.demotedRecs.v.filter(k=>k!==p.kind);
    S.params.demotedRecs.basis='policy '+todayISO()+' v'+POLICY_VER+' · '+p.fingerprint+' · '+p.explain;
  }
  logEvent('policy',{id:p.id,action:'approved',param:p.param,kind:p.kind,from:p.current,to:p.proposed,
    why:p.reason,evidence:p.fingerprint,bar:p.bar,obs:p.obs,ver:POLICY_VER});
  save(); toast('Approved — behavior changed, decision on permanent record');
  if(typeof rTrack==='function') rTrack();
}
function rejectProposal(id){
  const p=revisions(S).find(x=>x.id===id); if(!p) return;
  logEvent('policy',{id:p.id,action:'rejected',param:p.param,kind:p.kind,evidence:p.fingerprint,bar:p.bar,ver:POLICY_VER});
  save(); toast('Rejected — recorded; identical evidence will not re-ask');
  if(typeof rTrack==='function') rTrack();
}

  const lm=k=>{const a=(S.metrics||[]).filter(m=>m.key===k);return a.length?a[a.length-1]:null;};
  const rows=[['Height','ht','"'],['Weight','wt',' lb'],['Reach','reach','"'],['Wingspan','wing','"']].map(([n,k,u])=>{const m=lm(k);
    return `<div class="grow" style="text-align:center"><div class="mono" style="font-size:20px;font-weight:800">${m?m.val+u:'—'}</div><div class="note" style="margin:0">${n}${m?' · '+fmtD(m.d):''}</div></div>`;}).join('');
  return `<div class="card"><h3>The Frame <span class="r">growing — measure quarterly</span></h3>
    <div class="row">${rows}</div>
    <div class="note" style="margin-top:6px">Camp forms ask for every one of these. A growing frame is data coaches project on — log height every ~3 months and let the trend speak. No adult-height predictions here; guesses aren't data.</div>
  </div>`;
}
let pendingLift=null;
/* v7.32 owner answer: "between sets, but make it faster" — one tap re-logs the last set
   through logLift() itself, so sanity bounds and the PR flow still apply. */
function repeatLast(){
  const l=S.lifts[S.lifts.length-1]; if(!l){ toast('Nothing to repeat yet'); return; }
  $('#lgEx').value=l.ex; $('#lgWt').value=l.wt; $('#lgRp').value=l.reps;
  logLift();
}
/* v7.44 — owner control over the ladder, IN-APP (was previously only possible by editing a
   backup). Uses the app's own approved-params mechanism, with the decision on permanent record. */
function retireRec(kind){
  if(!kind) return;
  S.params.demotedRecs=S.params.demotedRecs||{v:[],basis:'default'};
  if(!S.params.demotedRecs.v.includes(kind)) S.params.demotedRecs.v.push(kind);
  S.params.demotedRecs.basis='owner '+todayISO()+' · retired from TODAY (re-approve any time in TRACK)';
  logEvent('policy',{id:'demote:'+kind,by:'owner',why:'retired from the ONE THING ladder in-app'});
  save(); rToday(); toast('Retired — the app will stop leading with that. Decision is on the record.');
}
/* v7.44 set dots — session-scoped (not persisted state: sets are execution, the block flag is the fact) */
let _setDots={};
function tapSet(i,n){
  const k=todayISO()+':'+i;
  _setDots[k]=((_setDots[k]||0)+1)>n?0:(_setDots[k]||0)+1;
  const full=_setDots[k]===n;
  if(full){ const s=S.sessions[todayISO()]; if(s&&!s[i]){ s[i]=true; save(); } }
  rTrain();
  if(!full&&_setDots[k]>0){ setTimeout(()=>{ try{ restTimer(150); }catch(e){} },30); toast('Set '+_setDots[k]+'/'+n+' — rest running'); }
  else if(full) toast('All '+n+' sets done ✓');
}
function tglBlock(i){ const k=todayISO(); if(!S.sessions[k]) return; S.sessions[k][i]=!S.sessions[k][i]; save();
  if(S.sessions[k].every(Boolean)){ const c=ckToday(); if(!c[0]){c[0]=true; save();} toast('Session complete — Train box checked ✓'); }
  rTrain(); }
let _rt=null;
function restTimer(sec){ clearInterval(_rt); const b=$('#restBtn'); if(!b) return; let n=sec;
  _rt=setInterval(()=>{ n--; const m=Math.floor(n/60), s2=String(n%60).padStart(2,'0');
    if(b) b.textContent='⏱ '+m+':'+s2;
    if(n<=0){ clearInterval(_rt); if(b) b.textContent='⏱ GO — next set'; if(navigator.vibrate) navigator.vibrate([200,100,200]); toast('Rest over. Move.'); }
  },1000); }
function logLift(){
  const ex=$('#lgEx').value, wt=+$('#lgWt').value, reps=+$('#lgRp').value;
  if(!wt||!reps||reps>15||wt<5||wt>700){ toast('Enter a real weight + reps (≤15)'); return; }
  const ref=Math.max(S.prs[ex]||0, Model.momentum().bestE1rm[ex]||0);
  if(ref&&epley(wt,reps)>ref*1.5&&pendingLift!==ex+wt+'x'+reps){
    pendingLift=ex+wt+'x'+reps;
    toast('That\'s '+Math.round(100*epley(wt,reps)/ref)+'% of your best — tap LOG SET again if it\'s real');
    return;
  }
  pendingLift=null;
  S.lifts.push({d:liftYest?addDays(todayISO(),-1):todayISO(),ex,wt,reps}); liftYest=false; save();
  const e=epley(wt,reps), cur=S.prs[ex];
  if(cur&&e>cur){
    $('#prSuggest').innerHTML=`<div class="flag">⬆ Estimated 1RM <b class="mono">${e}</b> beats your ${esc(ex)} PR (<span class="mono">${cur}</span>).
      <button class="btn sm amber" style="margin-left:8px" onclick="acceptPR('${ex}',${e})">UPDATE PR</button></div>`;
    toast('Set logged — possible PR');
  } else { toast('Set logged ✓'); rTrain(); }
}
function acceptPR(ex,e){
  S.prs[ex]=e;
  logEvent('pr',{ex,val:e,dow:new Date().getDay()});
  save(); toast(ex.toUpperCase()+' PR → '+e+' lb'); rTrain();
}

function buildProfile(){
  const m=k=>{const x=(S.metrics||[]).filter(y=>y.key===k).sort((a,b)=>a.d<b.d?1:-1)[0];return x?x.val:null;};
  const p=S.prs, forty=m('forty'), vert=m('vert'), broad=m('broad'), wt=m('wt'), gpa=m('gpa');
  return `${S.profile.name} [Last name] — Class of ${S.profile.classOf} — ${S.profile.pos}
Henderson, NV — 5'7" / ${wt||'—'} lb
Squat ${p.squat} · Deadlift ${p.dead} · Bench ${p.bench} · Hang clean ${p.clean}
40yd: ${forty?forty+'s (hand-timed)':'[untested — run it]'} · Vertical: ${vert?vert+' in':'[untested]'} · Broad: ${broad?broad+' in':'[untested]'}
GPA: ${gpa||'[log it]'} · NCAA Eligibility Center ID: [register at eligibilitycenter.org]
Hudl: [add your highlight link]
Contact: [parent name · phone · email]`;
}

function quickAdd(s){ if(S.pipeline.some(p=>p.school===s)){toast('Already on board');return;}

  logEvent('stage',{id,school:s,to:0}); save(); rPath(); toast(s+' added'); }
function touchP(id){ const p=S.pipeline.find(x=>x.id===id);
  logEvent('contact',{id,school:p.school});
  if(p.stage===0){ p.stage=1; logEvent('stage',{id,school:p.school,to:1}); }

function advP(id){ const p=S.pipeline.find(x=>x.id===id); p.stage=Math.min(5,p.stage+1);

  save(); rPath(); if(p.stage===5) toast('COMMITTED. That\'s the whole game.'); }
let pendingRm=null;
function rmP(id){ const p=S.pipeline.find(x=>x.id===id); if(!p) return;
  if(pendingRm!==id){ pendingRm=id; toast('Tap ✕ again to remove '+p.school); return; }
  pendingRm=null;
  S.pipeline=S.pipeline.filter(x=>x.id!==id);
  logEvent('removed',{id,school:p.school});
  save(); rPath(); toast(p.school+' removed — board stays honest'); }
function copyTpl(k){ const t=EMAIL_TEMPLATES[k]; navigator.clipboard?.writeText('Subject: '+t.subject+'\n\n'+t.body).then(()=>toast('Copied ✓')); }

/* intel — the honest intelligence layer: confidence by DATA AVAILABILITY, ranked missing inputs by unlock value. Never a fabricated score. */
function intel(s=S){
  const has=k=>(s.metrics||[]).some(m=>m.key===k);
  const wt=(s.metrics||[]).filter(m=>m.key==='wt').length;
  const ci=Object.keys(s.checkins||{}).length;
