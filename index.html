  const v=el?parseFloat(el.value):NaN; return isNaN(v)?pendNum.val:v; }
function numStep(d){ if(!pendNum) return; pendNum.val=+(numCur()+d).toFixed(2); showNumBar(); }
function numDateFlip(){ numDate=numDate==='today'?'yest':'today'; showNumBar(); }
function numClose(){ pendNum=null; try{ const b=document.querySelector('#numBar'); if(b&&b.remove) b.remove(); }catch(e){} }
function showNumBar(){ if(!pendNum) return;
  const html=`<div id="numBar" style="position:fixed;left:0;right:0;bottom:58px;z-index:98;background:var(--card);border-top:1px solid var(--line);box-shadow:0 -6px 18px rgba(0,0,0,.4);padding:10px 12px">
    <div class="row" style="gap:6px;align-items:center"><b style="font-size:12px;letter-spacing:.06em">${esc(pendNum.label.toUpperCase())}</b>
      <button class="btn sm ${numDate==='yest'?'amber':'ghost'}" onclick="numDateFlip()">${numDate==='yest'?'YESTERDAY':'today'}</button>
      <span class="grow"></span><button class="btn sm ghost" onclick="numClose()">✕</button></div>
    <div class="row" style="gap:6px;align-items:center;margin-top:8px">
      <button class="btn sm" onclick="numStep(-${pendNum.big})">−${pendNum.big}</button><button class="btn sm" onclick="numStep(-${pendNum.step})">−${pendNum.step}</button>
      <input id="numVal" inputmode="decimal" value="${pendNum.val}" style="flex:1;text-align:center;font-size:18px;font-weight:800;min-width:70px">
      <button class="btn sm" onclick="numStep(${pendNum.step})">+${pendNum.step}</button><button class="btn sm" onclick="numStep(${pendNum.big})">+${pendNum.big}</button>
      <button class="btn amber sm" onclick="numSave()">SAVE</button></div></div>`;
  try{ const old=document.querySelector('#numBar'); if(old&&old.remove) old.remove();
    document.body.insertAdjacentHTML('beforeend',html); }catch(e){}
}
function numSave(){ if(!pendNum) return; const v=numCur(); if(!v||v<=0){ toast('Enter a real number'); return; }
  const d=numDate==='yest'?addDays(todayISO(),-1):todayISO();
  (S.metrics=S.metrics||[]).push({d,key:pendNum.key,val:v,src:'manual'}); logEvent('metric',{key:pendNum.key,val:v});
  const k=pendNum.key, y=numDate==='yest'; numClose(); save();
  toast(k.toUpperCase()+' '+v+(y?' → yesterday ✓':' ✓')); try{ RENDER[curView](); }catch(e){}
}
function armVoid(kind,idx){ const key=kind+':'+idx;
  if(pendVoid!==key){ pendVoid=key; rTrack(); return; }
  pendVoid=null; voidEntry(kind,idx); }
function saveOpp(opp){ let el=null; try{ el=document.querySelector('#oppIn'); }catch(e){}
  const t=el&&el.value; if(!t||!t.trim()){ toast('Type the note first'); return; }
  (S.opp=S.opp||[]).push({d:todayISO(),opp,text:t.trim()}); save(); toast('Saved — scout notes outlive the season'); rPath(); }
function saveCamp(){ let n=null,w=null; try{ n=document.querySelector('#campN'); w=document.querySelector('#campW'); }catch(e){}
  if(!n||!n.value.trim()){ toast('Camp name first'); return; }
  logEvent('camp',{name:n.value.trim(),when:(w&&w.value||'').trim()}); pendCamp=false; save(); toast('Tracked — it will not be forgotten'); rPath(); }
/* ============ NAV + BOOT ============ */
const RENDER={today:rToday,train:rTrain,path:rPath,track:rTrack,push:rPush};
let curView='today';
function go(v){
  curView=v;
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  $('#v-'+v).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  RENDER[v]();
  if(typeof renderHdr==='function') renderHdr(); // scoreboard updates with every screen + every log
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
/* v7.43 SCOREBOARD HUD (audit: "average AI web builder hud") — the header is now a live
   stadium scoreboard: the gate, this week vs the bar, the streak. Psychology on purpose:
   the three numbers that define the mission are visible on EVERY screen, updating with
   every log — the cost of an empty day is never off-screen. */
let _wasOffline=false;
function renderHdr(){
  try{
    const gate=daysBetween(todayISO(),GATE_D1_CONTACT);
    const L=(typeof weekLedger==='function')?weekLedger():{cur:{days:0,actions:0},bar:{days:0,actions:0}};
    const won=L.cur.days>L.bar.days||(L.cur.days===L.bar.days&&L.cur.actions>L.bar.actions);
    let streak=0; for(let i=0;i<400;i++){ const c=S.checkins[addDays(todayISO(),-i)]||[]; if(c.some(Boolean)) streak++; else if(i>0) break; }
    const off=(typeof navigator!=='undefined'&&navigator.onLine===false);
    const ck=(S.checkins[todayISO()]||[]).filter(Boolean).length;
    $('#hdrCd').innerHTML=
      `<span class="sb-cell hero"><span class="sb-n mono">${gate}</span><span class="sb-k">DAYS · GATE</span></span>`+
      `<span class="sb-cell"><span class="sb-n mono" style="color:${won?'var(--green)':'var(--txt)'}">${L.cur.days}<i class="sb-sub">/${L.bar.days}</i></span><span class="sb-k">WK vs BAR</span></span>`+
      `<span class="sb-cell"><span class="sb-n mono" style="color:${ck===4?'var(--green)':'var(--txt)'}">${ck}<i class="sb-sub">/4</i></span><span class="sb-k">TODAY</span></span>`+
      `<span class="sb-cell"><span class="sb-n mono" style="color:${streak>0?'var(--amber)':'var(--faint)'}">${streak}</span><span class="sb-k">STREAK</span></span>`+
      (off?`<span class="sb-cell"><span class="sb-n" style="color:var(--cyan);font-size:16px">●</span><span class="sb-k">OFFLINE OK</span></span>`:'');
    /* ambient week rail: progress toward beating the bar, always visible, never nagging */
    const rail=document.querySelector('#hudRail i');
    if(rail){ const need=Math.max(L.bar.actions+1,1);
      const pct=Math.max(0,Math.min(100,Math.round(100*L.cur.actions/need)));
      rail.style.width=pct+'%';
      if(won) rail.style.background='linear-gradient(90deg,#2b5c44,var(--green))';
    }
  }catch(e){}
}
if(typeof window!=='undefined'&&window.addEventListener){
  window.addEventListener('online',()=>{ _wasOffline=false; renderHdr(); });
  window.addEventListener('offline',()=>{ _wasOffline=true; renderHdr(); toast('Offline — everything still logs and saves on this device ✓'); });
}
renderHdr();
/* storage armor (v7.30): persist request, then RESTORE-BEFORE-RENDER. The v7.29 order was a
   real bug (first render saved defaults into localStorage before the check could see it empty).
   Now nothing renders or saves until the mirror verdict is in (800ms cap). */
if(typeof navigator!=='undefined'&&navigator.storage&&navigator.storage.persist){ try{ navigator.storage.persist(); }catch(e){} }
/* v7.35 widget mode — the app's glanceable face. Open the same URL with #widget:
   iPad split-view companion, or a small pinned always-on-top window on the laptop.
   Same state, same truth, zero extra surface to maintain. */
function rWidget(){
  const gate=daysBetween(todayISO(),GATE_D1_CONTACT);
  const L=(typeof weekLedger==='function')?weekLedger():{cur:{days:0,actions:0},bar:{days:0,actions:0}};
  const ck=(S.checkins[todayISO()]||[]).filter(Boolean).length;
  const col=L.cur.days>L.bar.days||(L.cur.days===L.bar.days&&L.cur.actions>L.bar.actions)?'var(--green)':'var(--amber)';
  try{ document.body.classList.add('wm'); }catch(e){}
  $('#v-today').innerHTML=`<div class="wj">
    <div class="n mono">${gate}</div>
    <div class="l">days · june 15 gate</div>
    <div class="sub">
      <div><div class="v mono" style="color:${col}">${L.cur.days}<span style="color:var(--faint);font-size:.55em">/${L.bar.days}</span></div><div class="k">days vs bar</div></div>
      <div><div class="v mono" style="color:${col}">${L.cur.actions}<span style="color:var(--faint);font-size:.55em">/${L.bar.actions}</span></div><div class="k">work vs bar</div></div>
      <div><div class="v mono" style="color:${ck===4?'var(--green)':'var(--txt)'}">${ck}<span style="color:var(--faint);font-size:.55em">/4</span></div><div class="k">daily four</div></div>
    </div>
    <div class="one">${(o=>o?`<b>ONE THING:</b> ${esc(o.t)}`:'')(typeof oneThing==='function'?oneThing(decide()):null)}</div>
  </div>`;
  $('#v-today').classList.add('on');
}
const _wm=(typeof location!=='undefined'&&/widget/.test(location.hash||''));
function bootD1(){ if(_wm){ rWidget(); if(typeof cloudBoot==='function') cloudBoot(); return; } go('today'); if(typeof cloudBoot==='function') cloudBoot(); } // sync starts only after the mirror verdict — cloud merges with real local state, never with a placeholder
idbRestoreCheck(bootD1);
if(_wm&&typeof setInterval!=='undefined'){ setInterval(()=>{ try{ rWidget(); }catch(e){} },60000); } // widget stays fresh

/* offline support — guarded so non-browser test environments ignore it */
if(typeof navigator!=='undefined'&&'serviceWorker'in navigator){
  try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
}
</script></body></html>
