<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e14">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-180.png">
<title>D1 OS</title>
<style>
:root{
  --bg:#0a0e14; --bg2:#111826; --card:#151d2e; --card2:#1a2438;
  --line:#243049; --txt:#e8edf5; --dim:#8b98ad; --faint:#5a6478;
  --amber:#ffb020; --amber-dim:#8a6212; --cyan:#4dd0e1; --cyan-dim:#1e5f6b;
  --green:#4caf7d; --red:#e05555; --radius:14px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{font-size:16px}
body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  padding-bottom:calc(72px + env(safe-area-inset-bottom));min-height:100vh}
h1,h2,h3{font-weight:800;letter-spacing:.02em}
.mono{font-variant-numeric:tabular-nums}
#hdr{position:sticky;top:0;z-index:50;background:rgba(10,14,20,.92);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--line);padding:calc(10px + env(safe-area-inset-top)) 16px 10px;
  display:flex;justify-content:space-between;align-items:center}
#hdr .brand{font-size:15px;font-weight:900;letter-spacing:.12em;color:var(--amber)}
#hdr .cd{font-size:12px;color:var(--dim);text-align:right;line-height:1.35}
#hdr .cd b{color:var(--cyan);font-weight:800}
main{padding:16px;max-width:560px;margin:0 auto}
.view{display:none}.view.on{display:block}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:16px;margin-bottom:14px}
.card h3{font-size:12px;letter-spacing:.14em;color:var(--dim);margin-bottom:12px;text-transform:uppercase}
.card h3 .r{float:right;color:var(--faint);font-weight:600;letter-spacing:0}
.big{font-size:34px;font-weight:900}
.row{display:flex;gap:10px;align-items:center}
.grow{flex:1}
.btn{background:var(--card2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  padding:11px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit}
.btn.amber{background:var(--amber);border-color:var(--amber);color:#14100a}
.btn.ghost{background:transparent}
.btn.sm{padding:7px 10px;font-size:12px;border-radius:8px}
.btn:active{transform:scale(.97)}
input,select,textarea{background:var(--bg2);border:1px solid var(--line);color:var(--txt);border-radius:10px;
  padding:11px 12px;font-size:16px;font-family:inherit;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--cyan-dim)}
label{font-size:11px;letter-spacing:.08em;color:var(--dim);text-transform:uppercase;display:block;margin:10px 0 5px}
.pill{display:inline-block;font-size:11px;font-weight:800;letter-spacing:.06em;padding:3px 9px;border-radius:99px;
  background:var(--bg2);border:1px solid var(--line);color:var(--dim)}
.pill.amber{color:var(--amber);border-color:var(--amber-dim)}
.pill.cyan{color:var(--cyan);border-color:var(--cyan-dim)}
.pill.green{color:var(--green);border-color:#2b5c44}
.pill.red{color:var(--red);border-color:#6b2b2b}
#nav{position:fixed;bottom:0;left:0;right:0;z-index:50;display:flex;background:rgba(13,18,28,.96);
  backdrop-filter:blur(12px);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
#nav button{flex:1;background:none;border:none;color:var(--faint);font-family:inherit;font-size:10px;
  font-weight:800;letter-spacing:.08em;padding:10px 0 12px;cursor:pointer;display:flex;flex-direction:column;gap:3px;align-items:center}
#nav button .ic{font-size:19px;line-height:1}
#nav button.on{color:var(--amber)}
.dots{display:grid;grid-template-columns:repeat(15,1fr);gap:5px}
.dots i{aspect-ratio:1;border-radius:3px;background:var(--bg2);border:1px solid var(--line)}
.dots i.hit{background:var(--amber);border-color:var(--amber)}
.dots i.part{background:var(--amber-dim);border-color:var(--amber-dim)}
.chk{display:flex;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--line);cursor:pointer}
.chk:last-child{border-bottom:none}
.chk .box{width:24px;height:24px;border-radius:7px;border:2px solid var(--line);flex-shrink:0;display:grid;place-items:center;font-size:14px;color:#14100a;font-weight:900}
.chk.done .box{background:var(--amber);border-color:var(--amber)}
.chk.done .t{color:var(--dim);text-decoration:line-through}
.chk .t{font-size:15px;font-weight:600}
.chk .s{font-size:12px;color:var(--faint)}
.bar{height:8px;background:var(--bg2);border-radius:99px;overflow:hidden;margin-top:6px}
.bar i{display:block;height:100%;background:var(--amber);border-radius:99px;transition:width .3s}
.bar i.cyan{background:var(--cyan)}
table{width:100%;border-collapse:collapse;font-size:13px}
th{text-align:left;color:var(--faint);font-size:10px;letter-spacing:.1em;text-transform:uppercase;padding:6px 8px 6px 0}
td{padding:8px 8px 8px 0;border-top:1px solid var(--line)}
.seg{display:flex;background:var(--bg2);border:1px solid var(--line);border-radius:10px;padding:3px;margin-bottom:12px}
.seg button{flex:1;background:none;border:none;color:var(--dim);font-family:inherit;font-size:12px;font-weight:800;
  padding:8px 4px;border-radius:8px;cursor:pointer;letter-spacing:.04em}
.seg button.on{background:var(--card2);color:var(--amber)}
details{border-top:1px solid var(--line);padding:10px 0}
details summary{cursor:pointer;font-size:14px;font-weight:700;list-style:none;display:flex;justify-content:space-between;align-items:center}
details summary::after{content:'+';color:var(--faint);font-size:18px}
details[open] summary::after{content:'–'}
details .bd{padding:10px 0 4px;font-size:13px;color:var(--dim);line-height:1.55}
.note{font-size:12px;color:var(--faint);line-height:1.5;margin-top:8px}
.flag{background:#2a1a10;border:1px solid #6b4a1e;border-radius:10px;padding:10px 12px;font-size:13px;margin-bottom:10px}
.toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%);background:var(--card2);border:1px solid var(--amber-dim);
  color:var(--txt);padding:11px 18px;border-radius:12px;font-size:14px;font-weight:700;z-index:99;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.on{opacity:1}
.statgrid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.stat{background:var(--bg2);border:1px solid var(--line);border-radius:12px;padding:12px}
.stat .v{font-size:22px;font-weight:900}
.stat .k{font-size:10px;letter-spacing:.1em;color:var(--faint);text-transform:uppercase;margin-top:2px}
.empty{text-align:center;color:var(--faint);font-size:13px;padding:24px 0}
.prio{background:linear-gradient(135deg,#1a1206,#151d2e);border:1px solid var(--amber-dim);border-radius:var(--radius);padding:14px 16px;margin-bottom:14px}
.prio .k{font-size:10px;letter-spacing:.14em;color:var(--amber);font-weight:900}
.prio .t{font-size:16px;font-weight:800;margin-top:3px}
.prio .w{font-size:12px;color:var(--dim);margin-top:4px;font-style:italic}
</style>
</head>

const DARK_ROOM = [
  {"n": 1, "cat": "START", "title": "You're on scout team. Starter is a senior.", "do": "Scout team is NOT punishment. It's your audition. Every scout team rep is a chance to show varsity coaches you hit harder, run faster, pursue better than the player they are starting. Give the varsity offense a better look than they see on Friday night. Make the starting RB dread going against you. If the varsity RB tells his coach 'that freshman won't stop hitting me' you moved up the depth chart.", "why": "Scout team reps are evaluated just like game reps. Coaches notice who gives maximum effort regardless of jersey."},
  {"n": 2, "cat": "START", "title": "You made a mistake in a game and the coach is screaming.", "do": "BOUNCE (5 sec): Get up. Don't touch helmet. Don't look at sideline. Don't show frustration. FIX (next rep): Coach corrects you on sideline. Eye contact. 'Yes coach.' Visualize the correction. Execute on next snap. FLUSH (after game): Only AFTER the game do you review the mistake on film. Understand WHY. Physical error means reps fix it. Mental error means film fixes it. Write it down.", "why": "Coaches grade body language between plays more than the play itself. The kid who sulks gets buried. The kid who fixes next rep earns PT."},
  {"n": 3, "cat": "START", "title": "You're dressing varsity but not playing.", "do": "You are ONE PLAY AWAY. That is not a cliche. If the starting LB goes down, you are in. Stand with your position group (not with friends). Watch the starter EVERY series. Pre-snap checks. Drops. Alignment. When he comes off the field ask 'What are you seeing out there?' Stay warm for 4 quarters. Jog the sideline. Light shuffles. If you get called in cold, you will pull something.", "why": "Most freshmen who never play varsity are the ones who weren't mentally ready when called. The ones who get in and play well are remembered."},
  {"n": 4, "cat": "START", "title": "You got beat on a play and gave up a TD.", "do": "1. Play is over in 5 sec. Breathe. 'Next play.' 2. Don't avoid your coach. Make eye contact. Nod when he corrects. Fix it next rep. 3. Don't apologize to teammates. Don't make excuses. They have been beat before too. They don't care that you got beat. They care whether you give up or keep fighting. 4. After game: watch play on film. Why did you get beat? Wrong gap? Wrong angle? Bad tackle technique? Identify cause. Fix before Monday practice. 5. Next time same situation: ready.", "why": "Every D1 player has been beat for a TD. How they respond is what separates starters from backups."},
  {"n": 5, "cat": "START", "title": "An upperclassman is messing with you.", "do": "1. Do not react emotionally. Upperclassmen test freshmen to see who can handle pressure. If you get angry, cry, or complain to coaches, you fail the test. 2. Kill them with effort. The best response is to outwork them on the field. Be first in every line. Hit harder than they do. Never complain. Let your play talk. 3. If it crosses into bullying, harassment, or anything physical/dangerous: tell your parents. Tell your position coach. You do NOT have to tolerate abuse. 4. Build relationships with helpful upperclassmen. Ask questions. Learn.", "why": "Hazing is a real thing but the worst version dies in college programs. Coaches grade who handles adversity."},
  {"n": 6, "cat": "INJURY", "title": "You're injured and can't practice.", "do": "1. Communicate with athletic trainer daily. Know diagnosis. Know timeline. Follow rehab EXACTLY. 2. Attend every practice. Even if you can't participate. Stand with position group. Watch drills. Take mental reps. Visualize executing. 3. Increase film study to 30 min/day. You have extra time. Use it. Watch your own game film. Watch the opponent. Watch college LBs. 4. Do what you CAN do. Upper body injury means lower body work. Lower body injury means upper body work. If you can move ANY part of your body, train that part. 5. Do NOT rush your return. Coming back 2 weeks early and re-injuring equals 6 more weeks. Trust trainer's timeline.", "why": "Injured athletes who stay engaged come back stronger. Athletes who disappear come back rusty AND risk re-injury."},
  {"n": 7, "cat": "START", "title": "You're thinking about quitting.", "do": "1. This feeling is normal. It does not mean you don't love football. It means you're human and the season is grinding. 2. Do NOT make the decision on a bad day. Wait 48 hours. Sleep on it. Eat a good meal. Then decide. Most 'I want to quit' feelings pass after a good night's sleep and a good practice. 3. Talk to someone who has been there. Your dad. Your wrestling coach. An older athlete you respect. They have all wanted to quit at some point. 4. Remember why you started. D1 linebacker. December 17, 2030. Every rep between now and then matters. Quitting today means you gave up on that goal. 5. If you truly, deeply do not want to play football: that's okay. Make the decision from CLARITY not exhaustion. Finish the season. Then decide.", "why": "Every athlete has wanted to quit. The ones who finished won more than they realized at the time."},
  {"n": 8, "cat": "INJURY", "title": "Coach screams at you in practice.", "do": "Response: 'Yes coach.' Eye contact. That's it. Do NOT: explain, defend, argue, roll your eyes, look at teammates, mumble. Next rep: execute the correction VISIBLY. Coaches scream because they care. The kid who absorbs correction equals the kid who plays.", "why": "This is a test. Every kid in the program watches how you respond. Respond right and you earn respect from teammates AND coaches."},
  {"n": 9, "cat": "INJURY", "title": "You get subbed out mid-drive.", "do": "Helmet stays ON. Walk to sideline with shoulders BACK. Stand near position coach. Watch the field, NOT the bench. When the kid who replaced you makes a play: CHEER for him. Visibly. When position coach is free: 'Coach, what do I need to do better?' Get the answer. Memorize. Execute on next snap. Body language coaches notice: kid who pouts gets pulled LONGER. Kid who supports gets put back in FASTER.", "why": "The bench is a visible test. Your teammates are watching. The coach is watching."},
  {"n": 10, "cat": "HEAT", "title": "It's 100F and two-a-days week 1.", "do": "Pre (T-3hr): 24oz water + real meal (chicken rice greens). Pre (T-1hr): 16oz water + electrolytes (LMNT or quarter tsp salt + lemon + Gatorade). During: sip 6-8oz every 15-20 min. Between (2hr break): 32oz water + protein shake + real meal. Lie down in AC for 20 min. After PM: weigh yourself. 16-24oz water per lb lost. Heat exhaustion signs: cold/clammy skin, weak pulse, dizziness, cramps means TELL TRAINER NOW. Heat stroke: hot DRY skin, confusion, body temp 104+ means CALL 911 + cold immersion immediately.", "why": "Heat illness kills HS players every summer. Henderson NV gets 100-115F. This isn't Texas, this is dry heat that masks dehydration until it's too late."},
  {"n": 11, "cat": "HEAT", "title": "Friday night 1-3 record mid-season.", "do": "Mental: season is NOT over. Reset weekly. Each game is its own season. Team meeting: stand up. Be vocal. 'We're 1-3 because of X, Y, Z. Here's what we fix this week.' Even as a freshman. Practice: show up Monday like it's game day. Energy fixes a losing locker room faster than scheme changes. Game time: play for the LB next to you, not the scoreboard. Effort + execution equals your only job.", "why": "Half the league goes through this every year. Teams that recover equals playoff teams. Teams that don't equals season's over by Week 6."},
  {"n": 12, "cat": "INJURY", "title": "You sprain an ankle week 3.", "do": "Day 1: RICE protocol. Ice 20 min on / 20 min off. Compression wrap. Elevation above heart. Tell trainer. Day 2-3: continue RICE. Alphabet drill 3x daily (trace letters with big toe). Calf raises (seated) 3x15. Day 4-7: single-leg balance 30s x 5. Resistance band 4-directions (inversion, eversion, dorsi, plantar) 2x15 each. Week 2: return to running. Tape ankle for first 2 weeks back. Re-sprain rate equals 3x if you skip tape. Communication: stay engaged with team. Sit in on film. Help younger LBs with reads.", "why": "Ankle sprains are the most common football injury. Re-sprain rate is 3x without tape. Easy prevention."},
  {"n": 13, "cat": "HEAT", "title": "Wrestling season starts and football peers pressure you to quit it.", "do": "Reality check: wrestling IS your football superpower. Hand-fighting. Leverage. Mat awareness. Contact comfort. You do NOT quit wrestling for football. Multi-sport athletes get recruited at HIGHER rates than single-sport. College coaches prefer them. Adjust football maintenance: 1 lift/wk during wrestling season. 3x3 squat + bench at 80%. Hip mobility daily (wrestling shortens hips). Tell football coach: 'I will be on the mat Dec-Feb. I will do football maintenance lifts on Sundays. I will be back at 100% for spring ball.' That's a pro answer.", "why": "D1 coaches LOVE multi-sport athletes. Walking away from wrestling equals walking away from your recruiting advantage."},
  {"n": 14, "cat": "PEER", "title": "Teammate offers you weed at a party.", "do": "Answer: 'Nah I'm good.' Then walk away. Don't lecture. Don't moralize. Don't make a scene. Just decline and leave. Truth: THC degrades REM sleep by 30-40% for 24+ hours after use. REM is when growth hormone releases. One weekend of weed equals a week of stunted recovery. Compounds over a season. NCAA testing: THC IS tested. Positive equals suspension at most programs. Your D1 dream ends. Bigger truth: the kids who say no consistently end up at the parties of the kids who said yes, except they're celebrating signing day.", "why": "Single moment. Permanent consequence. Don't risk 1,500 days of work for one weekend."},
  {"n": 15, "cat": "PEER", "title": "Girlfriend drama is destroying your focus.", "do": "Direct truth: any relationship that drains your focus during HS football season costs you reps coaches notice. Decision matrix: Does she support your training schedule? Keep. Does she complain when you can't hang out 6 days/week? Talk it out. Does drama from her affect your sleep/film/lifting? Reset boundaries. Does it require you to skip workouts/film/camps? End it. This is not romantic advice. This is PERFORMANCE advice. The right partner accelerates your path. The wrong one ends it.", "why": "Distraction compounds. A bad week of sleep + missed film + missed lift session equals measurable performance drop. Coaches grade it."},
  {"n": 16, "cat": "RECRUIT", "title": "No offers by Thanksgiving senior year.", "do": "Don't panic. 60% of D1 commitments happen in SPRING of senior year. Phase 1 (Nov): Email blitz. 50 coaches across all 4 levels. Subject line: '2030 LB Update [Last Name]'. Phase 2 (Dec): Early Signing Day passes without you. NOT THE END. Many programs save scholarships for Feb. Phase 3 (Jan): Open conversations with FCS + D2 hard. Multiple offers usually emerge. Phase 4 (Feb): National Signing Day target equals PWO at G5 + JUCO backup. Both produce D1 careers. The work isn't done. Senior film keeps producing. Combine retesting matters. Window stays open until April.", "why": "The NCAA signing window stays open for months after Thanksgiving. Most signings happen in Feb-March."},
  {"n": 17, "cat": "RECRUIT", "title": "Coach gets fired mid-recruiting.", "do": "Reality: coaching changes happen. Position coach who recruited you may leave. HC who offered you may get fired. Immediate: reach out to recruiting coordinator (different person than position coach). 'Coach, what's my status with the program going forward?' Get the answer IN WRITING. Re-evaluate: the new staff may not recruit your position the same way. They may want a different body type. Verbal commitments are not binding. You can de-commit if the fit changes. Inform the new staff respectfully. Stay in the portal mindset even before college. Programs change. Be ready.", "why": "Verbal commits evaporate when staff changes. This is rare but happens. Don't tie your identity to one staff."},
  {"n": 18, "cat": "PEER", "title": "A friend who's better than you gets an offer before you.", "do": "Normal. Doesn't mean anything about your ceiling. They played a different role on their team. They got seen by the right coach at the right time. They had a better highlight film. They got lucky on a measurables day. You will have your moment. Don't compare timelines. Don't hate. Be happy for them, that energy comes back. Keep stacking days. The offer you get in 2029-2030 will be THE offer. Not theirs.", "why": "D1 offers are timing-dependent. Your timeline is yours. Stay locked in."},
  {"n": 19, "cat": "PEER", "title": "Friend quits the team.", "do": "1. Don't follow. Their reasons are theirs. Yours are yours. 2. Don't trash-talk them to other teammates. That ages badly. 3. Don't feel guilty for staying. You're not responsible for their choice. 4. Notice if other teammates seem shaken. Be the steady one. Talk to your HC: 'How do we want to handle this as a team?' Show leadership. 5. If you feel your own motivation wobbling because of it, re-read the North Star and talk to your sponsor or coach.", "why": "Quits ripple through teams. Be the steady one. The coach notices who doesn't waver."},
  {"n": 20, "cat": "PEER", "title": "You get cut from a camp.", "do": "Normal. Common. Camp rosters are limited. Coaches have favorites already. Email another school. Apply to 2 more camps that week. Rejection is normal. Reach out MORE, sit back LESS.", "why": "D1 camps reject 80% of applicants. It means nothing about your ceiling."},
  {"n": 21, "cat": "RECRUIT", "title": "Sponsor pulls funding.", "do": "Stay grateful. Don't beg. Ask 'what would change your mind?' If permanent: keep going. JUCO is real. Walk-on is real. You're not done. The plan isn't dependent on one person's money. Your work ethic is independent. Your body is independent. Your film is independent. Most D1 players DON'T have family money backing them. The dream survives without sponsor.", "why": "Half the D1 roster is walk-ons or partial-scholarship. Money doesn't make you a D1 athlete. Your work does."},
  {"n": 22, "cat": "PEER", "title": "Coach says you're not ready for varsity.", "do": "Ask 'What do I need to work on to be ready?' Get specific. 'You need to add 10 lb, drop your 40 by 0.2s, and learn the full LB playbook.' That's actionable. Work it. Re-ask in 4 weeks. Show progress. Earn the spot. JV is a TEMPORARY stop, not a permanent label. Most multi-year D1 starters spent JV time. Don't sulk, train.", "why": "JV year builds depth. Many D1 LBs were 2-way starters who spent freshman year on JV."},
  {"n": 23, "cat": "PEER", "title": "Negative press / drama at school.", "do": "Stay off social media for 48 hours. Talk to parents. Wait it out. Don't post anything until calm. Coaches notice who handles public attention with maturity. One bad social post equals lost offers. This is not the moment to defend yourself publicly. Let it die.", "why": "Every D1 program monitors social media. One bad post equals lost offer."},
  {"n": 24, "cat": "RECRUIT", "title": "You get an offer from a D1 school you didn't expect.", "do": "Don't commit on the spot. Thank coach. Tell parents + sponsor + head coach. Take 1 week to decide. Visit campus first. Ask 5-7 of the questions from Coach Interview Q&A. Talk to current players. Sleep on it. The offer is real. But a rushed decision at 15 on something you will live with for 4 years equals bad idea.", "why": "Decisions made in 24 hours are decisions you will regret for 4 years."},
  {"n": 25, "cat": "INJURY", "title": "Concussion symptoms after a hit.", "do": "Tell coach + parents IMMEDIATELY. See doctor within 48 hrs. NEVER play through suspected concussion. RICE protocol + sponsor-paid PT if needed. Use SCAT6 checklist (in SAFETY tab). 6-step Return-to-Play protocol. No same-day return. Period.", "why": "Second-impact syndrome equals catastrophic. CTE is real. One game isn't worth your brain."},
  {"n": 26, "cat": "HEAT", "title": "Cramping in summer practice.", "do": "Stop. Sit. Stretch the cramped muscle. Sip water with electrolytes (NOT plain water, need Na). Tell trainer. 5-10 min rest. If cramping is severe equals day off. Cramping is your body saying sodium is low + you pushed too hard. Tomorrow: salt-load breakfast (eggs + LMNT).", "why": "Cramping is preventable. Coaches grade who manages it."},
  {"n": 27, "cat": "START", "title": "You score your first varsity TD.", "do": "Celebrate with your teammates. Spike the ball sparingly. Hand it to the ref. Run back to the huddle. Don't draw attention. Coaches grade who celebrates the team vs who celebrates themselves. The team that scores often is the team that prepares quietly. After game: 'Thanks to the OL who blocked for me.' Credit them every single time.", "why": "First TD equals memorable moment. How you celebrate equals grades your character."},
  {"n": 28, "cat": "RECRUIT", "title": "Coach Cahill praises you in front of the team.", "do": "Say 'Thank you coach.' Keep working. Don't get comfortable. Praise from your HC means: he's noticed. Now he expects consistency. The trap is reading your own press. Same thing NFL rookies fall into. Stay the same person. Same work. Next day.", "why": "Praise is feedback. The response determines whether more comes."},
  {"n": 29, "cat": "RECRUIT", "title": "A D1 coach you emailed personally responds.", "do": "Reply within 24 hours. Polite. Short. Professional. Full sentences. 'Thank you Coach [Last Name]. I would love to be on your board at [School]. Here is my updated Hudl: [link]. My coach contact: Coach Cahill, [email], [phone]. When would be a good time to call?' Ask: 'What is the next step?' Camp invite? Questionnaire? Phone call? Don't promise anything. Don't commit. Just engage and gather info.", "why": "Coach responsiveness is a recruiting signal. Quick professional reply equals serious recruit."},
  {"n": 30, "cat": "HEAT", "title": "Last play of the game. You're exhausted. Tie score.", "do": "This is what you trained for. 4-7-8 breath. Cue word: 'FINISH.' Lower pads. One play. Execute. After: walk off the field with shoulders back regardless of outcome. You earned this moment. Post-game: shake hands. Find parents in stands. Tell sponsor. Journal: 'What did I learn about myself tonight?' Carry it forward.", "why": "The biggest moments come when you're most tired. How you respond equals who you are."},
];

    {n:'EOS recovery suite or easy walk',s:'30 min'},
    {n:'Watch your own game film',s:'5-question framework on YOUR plays — this is how film habits start'}]};

    {n:'Team practice is the work today',s:'Show up early. Effort shows on film even in practice.'},

}

function loadS(){

function migrate(p){
  const s=structuredClone(DEFAULTS);
  for(const k in p) if(k in s) s[k]=p[k];
  // v7.0 → v7.1: phase is computed now; last lives in events
  if(s.settings){ delete s.settings.phase; if(s.settings.gameDay===undefined) s.settings.gameDay=5; }
  for(const k in DEFAULTS.params) if(!s.params[k]) s.params[k]=structuredClone(DEFAULTS.params[k]);
  for(const pl of s.pipeline||[]){
    if(pl.last){ // migrate legacy last-contact into an event if none exists
      if(!(s.events||[]).some(e=>e.type==='contact'&&e.meta&&e.meta.id===pl.id))
        s.events.push({d:pl.last,type:'contact',meta:{id:pl.id,school:pl.school}});
      delete pl.last;
    }
  }
  return s;
}

  rd.readAsText(file);
}

/* ============ ATHLETE STATE MODEL — pure derived views. Never stored. ============
   Only dimensions the logged data can support (ARCHITECTURE.md). */
const Model={
  /* streak with one shield per rolling 7 days: a single 3/4 day doesn't break the chain (A2) */
  consistency(s=S,today=todayISO()){
    const day=iso=>s.checkins[iso]||null;
    const full=iso=>{ const c=day(iso); return !!c&&c.every(Boolean); };
    const three=iso=>{ const c=day(iso); return !!c&&c.filter(Boolean).length===3; };
    let streak=0, shields=[], d=today;
    if(!full(d)&&!three(d)) d=addDays(d,-1); // today in progress doesn't count against you
    while(true){
      if(full(d)){ streak++; }
      else if(three(d) && !shields.some(x=>daysBetween(d,x)<7)){ shields.push(d); streak++; }
      else break;
      d=addDays(d,-1);
    }
    const first=Object.keys(s.checkins).sort()[0]||today;
    const span=n=>{ let hit=0,tot=0,skips=[0,0,0,0];
      for(let i=0;i<n;i++){ const iso=addDays(today,-i); if(iso<first) break;
        tot++; const c=day(iso)||[false,false,false,false];
        if(c.every(Boolean)) hit++;
        c.forEach((b,j)=>{ if(!b) skips[j]++; }); }
      return {rate:tot?hit/tot:0,skips,tot}; };
    const s7=span(7), s30=span(30);
    // gap = days since last day that counted (for comeback rule)
    const dates=Object.keys(s.checkins).filter(k=>full(k)||three(k)).sort();
    const lastGood=dates.at(-1)||null;
    return {streak, shieldsUsed:shields.length, rate7:s7.rate, rate30:s30.rate,
            skips30:s30.skips, days30:s30.tot,
            gapDays:lastGood?Math.max(0,daysBetween(lastGood,today)-1):null,
            everComplete:dates.length>0};
  },
  momentum(s=S,today=todayISO()){
    const sets7=s.lifts.filter(l=>daysBetween(l.d,today)<7).length;
    const days=[...new Set(s.lifts.map(l=>l.d))].sort();
    let consec=0, d=today;
    if(!days.includes(d)) d=addDays(d,-1);
    while(days.includes(d)){ consec++; d=addDays(d,-1); }
    // gap since last logged training day (for comeback deload)
    const lastLift=days.at(-1)||null;
    const bestE1rm={};
    for(const ex of ['squat','dead','bench','clean']){
      const l=s.lifts.filter(x=>x.ex===ex);
      if(l.length) bestE1rm[ex]=Math.max(...l.map(x=>epley(x.wt,x.reps)));
    }
    return {sets7, consecDays:consec, bestE1rm,
            trainGap:lastLift?Math.max(0,daysBetween(lastLift,today)):null};
  },
  /* comeback deload factor (DISCOVERY policy 9): scaled to layoff, never punitive */
  deloadFactor(s=S,today=todayISO()){
    const g=this.momentum(s,today).trainGap;
    if(g==null||g<10) return 1;       // normal life
    if(g<21) return .90;              // 10–20 days out → 90% loads this week
    if(g<45) return .80;              // 3–6 weeks → 80%
    return .70;                       // longer → 70%, rebuild honestly
  },
  /* plateau: 21d of exposure with no e1RM progress. Honest thresholds: needs ≥6 sets in window. */
  plateau(s=S,ex,today=todayISO()){
    const win=s.lifts.filter(l=>l.ex===ex&&daysBetween(l.d,today)<=21);
    if(win.length<6) return {plateaued:false,weeks:0};
    const best=Math.max(...win.map(l=>epley(l.wt,l.reps)));
    const before=s.lifts.filter(l=>l.ex===ex&&daysBetween(l.d,today)>21);
    if(!before.length) return {plateaued:false,weeks:0};
    const prior=Math.max(...before.map(l=>epley(l.wt,l.reps)));
    const stuck=best<=prior;
    return {plateaued:stuck, weeks:stuck?Math.floor(daysBetween(before.at(-1).d,today)/7):0};
  },
  iq(s=S,today=todayISO()){
    const wk=s.pushLog.filter(p=>daysBetween(p.d,today)<7);
    return {reps7:wk.length, lastType:s.pushLog.at(-1)?.type||null};
  },
  lastContact(s,id){
    const ev=(s||S).events.filter(e=>e.type==='contact'&&e.meta&&e.meta.id===id).map(e=>e.d).sort();
    return ev.at(-1)||null;
  },
  recruiting(s=S,today=todayISO()){
    const flags=s.pipeline.filter(p=>{
      if(p.stage<1||p.stage>=5) return false;
      const lc=this.lastContact(s,p.id);
      return lc&&daysBetween(lc,today)>=(s.params?.followupDays?.v??FOLLOWUP_DAYS);
    });
    const contacted=s.pipeline.filter(p=>p.stage>=1).length;
    const responded=s.pipeline.filter(p=>p.stage>=2).length;
    const rts=[];
    for(const p of s.pipeline.filter(p=>p.stage>=2)){
      const c=s.events.find(e=>e.type==='contact'&&e.meta.id===p.id);
      const r=s.events.find(e=>e.type==='stage'&&e.meta.id===p.id&&e.meta.to===2);
      if(c&&r) rts.push(daysBetween(c.d,r.d));
    }
    return {flags, contacted, responded,
            responseRate:contacted?responded/contacted:null,
            avgDaysToResponse:rts.length?Math.round(rts.reduce((a,b)=>a+b)/rts.length):null};
  },
  /* stage-gated: progress vs the CURRENT YEAR's waypoint; biggest deficit = the flaw the engine attacks */
  waypointGaps(s=S,today=todayISO()){
    const wp=currentWaypoint(today), g=this.gaps(s), mom=this.momentum(s,today);
    const cur=k=>{ if(['squat','bench','dead','clean'].includes(k)) return Math.max(s.prs[k]||0,mom.bestE1rm[k]||0)||null;
      return g.latest(k); };
    const baseline=k=>{ const m=s.metrics.filter(x=>x.key===k).sort((a,b)=>a.d<b.d?-1:1)[0]; return m?m.val:null; };
    const rows=[];
    for(const k in wp.targets){ const c=cur(k), t=wp.targets[k];
      rows.push({key:k,cur:c,target:t,progress:c==null?null:Math.min(1,c/t),rel:false}); }
    for(const k in wp.rel){ const b=baseline(k), c=g.latest(k);
      const t=b==null?null:+(b+wp.rel[k]).toFixed(2);
      const lower=k==='forty';
      rows.push({key:k,cur:c,target:t,rel:true,
        progress:(t==null||c==null)?null:Math.min(1,lower?(c<=t?1:t/c):(c/t))}); }
    const scored=rows.filter(r=>r.progress!=null);
    const primary=scored.length?scored.reduce((a,b)=>a.progress<=b.progress?a:b):null;
    return {label:wp.label, rows, primary};
  },
  gaps(s=S){
    const latest=k=>{ const m=s.metrics.filter(x=>x.key===k).sort((a,b)=>a.d<b.d?1:-1)[0];
      if(m) return m.val;
      const b=BENCHMARKS.find(x=>x.key===k);
      return b&&b.pr? s.prs[b.pr]??null : null; };
    const rows=BENCHMARKS.map(b=>{
      const v=latest(b.key);
      const hit={}; for(const t in b.tiers) hit[t]=v==null?null:(b.lower?v<=b.tiers[t]:v>=b.tiers[t]);
      return {...b,val:v,hit};
    });
    return {rows, latest};
  },
  weightTrend(s=S,today=todayISO()){
    const wts=s.metrics.filter(m=>m.key==='wt').sort((a,b)=>a.d<b.d?-1:1);
    if(wts.length<2) return {latest:wts.at(-1)?.val??null, stalled:false, enough:false};
    const latest=wts.at(-1);
    const ref=wts.filter(w=>daysBetween(w.d,latest.d)>=21).at(-1);
    if(!ref) return {latest:latest.val, stalled:false, enough:false};
    return {latest:latest.val, ref:ref.val, delta:+(latest.val-ref.val).toFixed(1),
            stalled:(latest.val-ref.val)<1, enough:true};
  },
  academic(s=S,today=todayISO()){
    const g=s.metrics.filter(m=>m.key==='gpa').sort((a,b)=>a.d<b.d?1:-1)[0];
    return {gpa:g?.val??null, daysSince:g?daysBetween(g.d,today):null};
  },
  baselineDone(s=S){
    return ['forty','vert','broad'].every(k=>s.metrics.some(m=>m.key===k));
  },
  /* descriptive instrumentation — mirrors, not oracles */
  systemRead(s=S,today=todayISO()){
    const c=this.consistency(s,today);
    const names=['Train','Fuel','IQ rep','Sleep'];
    let worst=null;
    if(c.days30>=7){ const i=c.skips30.indexOf(Math.max(...c.skips30));
      if(c.skips30[i]>0) worst={name:names[i],pct:Math.round(100*c.skips30[i]/c.days30)}; }
    const prDays=s.events.filter(e=>e.type==='pr').map(e=>e.meta.dow);
    const prByDay=prDays.length?[...new Set(prDays)].map(d=>({day:d,n:prDays.filter(x=>x===d).length})).sort((a,b)=>b.n-a.n):[];
    const r=this.recruiting(s,today);
    return {worstSkip:worst, prByDay,
            responseRate:r.responseRate, avgDaysToResponse:r.avgDaysToResponse,
            trendUp:c.rate7>=c.rate30, rate7:c.rate7, rate30:c.rate30, days30:c.days30};
  }
};
/* ============ DECISION ENGINE — decide(S,date) → plan. Deterministic. Every item has a why. ============ */
function weekFor(s,dateISO){
  const ph=phaseFor(dateISO);
  return ph==='inseason'? inseasonWeek(s.settings.gameDay) : TEMPLATES[ph];
}
function decide(s=S,dateISO=todayISO()){
  const date=new Date(dateISO+'T12:00'), dow=date.getDay();
  const ph=phaseFor(dateISO);
  const con=Model.consistency(s,dateISO), mom=Model.momentum(s,dateISO),
        iq=Model.iq(s,dateISO), rec=Model.recruiting(s,dateISO), aca=Model.academic(s,dateISO);
  const deload=Model.deloadFactor(s,dateISO);
  const P=s.params;
  const wg=Model.waypointGaps(s,dateISO);
  const plan={date:dateISO, phase:ph, deload, tasks:[], focus:wg.primary};

  // 1 · PRIORITY (game day outranks everything; then comeback; then recovery; then phase)
  if(ph==='inseason'&&dow===(s.settings.gameDay??5)){
    plan.priority={title:'Game day. Empty the tank.',
      why:'Everything this week pointed here. Eat real food, run your pre-game script, and play fast — the film gets made today.'};
  } else if(con.everComplete && con.gapDays!=null && con.gapDays>=2){
    plan.priority={title:'Back to work',
      why:`${con.gapDays} days off the board. That's done — today counts. Loads are adjusted; just execute.`};
  } else if(mom.consecDays>=P.maxConsec.v){
    plan.priority={title:'Recover on purpose',
      why:`${mom.consecDays} straight training days logged. Adaptation happens in recovery — backing off IS the work today.`};
  } else {
    const focus={preseason:'Season is coming — build speed, keep strength',
      inseason:'Fresh for film — everything serves Friday',
      wrestling:'Defend the mass, stay strong',
      track:'Track builds your 40 — we hold the strength',
      offseason:'Strength converts to speed'}[ph];
    plan.priority={title:focus, why:'Phase plan: '+ph+'. The work is chosen — execute it.'};
  }

  // 2 · WORKOUT (recovery override beats template; deload scales loads)
  const week=weekFor(s,dateISO);
  plan.workout = mom.consecDays>=P.maxConsec.v ? {...TEMPLATES.recoveryTemplate,
      why:`Override: ${mom.consecDays} consecutive training days. Earned, not optional.`}
    : {...(week.find(w=>w.day===dow)||TEMPLATES.restDay),
       why:ph+' plan for '+['Sun','Mon','Tue','Wed','Thu','Fri','Sat'][dow]+
           (deload<1?` · loads at ${Math.round(deload*100)}% while you ramp back`:'')};

  // 2b · FLAW FOCUS — one bounded block attacking the biggest waypoint gap
  if(wg.primary&&FOCUS_BLOCKS[wg.primary.key]&&ph!=='inseason'&&!plan.workout.recovery){
    let f=FOCUS_BLOCKS[wg.primary.key];
    // plateau breaker: stalled focus lift rotates through stimulus variants weekly
    if(FOCUS_VARIANTS[wg.primary.key]){
      const pl=Model.plateau(s,wg.primary.key,dateISO);
      if(pl.plateaued){
        const v=FOCUS_VARIANTS[wg.primary.key][pl.weeks%FOCUS_VARIANTS[wg.primary.key].length];
        f={...FOCUS_BLOCKS[wg.primary.key],n:v.n,s:v.s+' (plateau breaker — stimulus rotated, week '+(pl.weeks+1)+')'};
      }
    }
    const isLower=/LOWER|CONTRAST|FULL BODY/.test(plan.workout.title);
    const isUpper=/UPPER|BENCH/.test(plan.workout.title);
    const isSpeed=/SPEED|ATHLETICISM/.test(plan.workout.title);
    if(f.on==='note'||(f.on==='lower'&&isLower)||(f.on==='upper'&&isUpper)||(f.on==='speed'&&isSpeed)){
      plan.workout={...plan.workout, blocks:[...plan.workout.blocks,{n:f.n,s:f.s}],
        why:plan.workout.why+' · Focus added: '+wg.primary.key+' is your biggest gap vs the '+wg.label.split('·')[0].trim()+' waypoint.'};
    }
  }

  // 3 · ONE-TIME SETUP (until each is done)
  for(const t of SETUP_TASKS) if(!taskDone(t.id))
    plan.tasks.push({kind:'setup',id:t.id,title:t.title,why:t.why});

  // 4 · BASELINE TEST DAY (until forty+vert+broad exist)
  if(!Model.baselineDone(s) && !taskDone('baseline:scheduled'))
    plan.tasks.push({kind:'test',id:'baseline:scheduled',title:'Baseline test day: 40yd (hand-timed), vertical, broad jump',
      why:'Every goal you have is a guess until there\'s a starting number. Cousin times, you run. Log all three in TRACK.'});

  // 5 · FOOTBALL IQ (rotation; urgency note if behind; clears when a rep is logged)
  const iqId='iq:'+dateISO;
  if(!taskDone(iqId)){
    const rot=['film','darkroom','viz'][Math.floor(daysBetween('2026-01-01',dateISO))%3];
    const iqTitles={film:'Run the 5 questions on one play set',darkroom:'Draw one dark-room scenario',viz:'One 5-minute visualization script'};
    plan.tasks.push({kind:'iq',id:iqId,type:rot,title:iqTitles[rot],
      why:iq.reps7<2?`${iq.reps7} IQ rep${iq.reps7===1?'':'s'} this week. Undersized players win with their head — this is that work.`:'Daily rotation.'});
  }

  // 6 · RECRUITING (NCAA-gated; flags always surface)
  for(const p of rec.flags) plan.tasks.push({kind:'recruit',id:'recruit:'+p.id,title:`Update email to ${p.school}`,
    why:`${daysBetween(Model.lastContact(s,p.id),dateISO)} days since contact — past the ${FOLLOWUP_DAYS}-day window. GENERIC UPDATE template, one real stat.`});
  const pulseId='pulse:'+dateISO.slice(0,7);
  if(!rec.flags.length && !taskDone(pulseId) && date.getDate()>=1 && dow===0){
    plan.tasks.push({kind:'recruit',id:pulseId,title:'Monthly recruiting pulse',
      why:dateISO<GATE_D1_CONTACT?'Pre-gate: update Hudl + measurables, one X post, add one school to the board.':'Gate is open: updates to the full active board.'});
  }

  // 7 · MONTHLY BACKUP (keyed to completion, not calendar luck)
  const bkId='backup:'+dateISO.slice(0,7);
  if(!taskDone(bkId) && taskDone('setup:export'))
    plan.tasks.push({kind:'backup',id:bkId,title:'Monthly backup: export + save to iCloud Files',
      why:'15 seconds. Protects everything you\'ve logged. TRACK → Data → Export.'});

  // 8 · FUEL — the mass mission watches itself (350-500 kcal surplus evidence)
  const wtr=Model.weightTrend(s,dateISO);
  const fuelId='fuel:'+dateISO.slice(0,7);
  if(wtr.enough&&wtr.stalled&&!taskDone(fuelId)&&ph!=='wrestling'){
    plan.tasks.push({kind:'fuel',id:fuelId,title:'Weight stalled — add ~300 kcal/day',apply:'kcal300',
      why:`${wtr.ref}→${wtr.latest} lb over 3+ weeks. The lifting is working; the surplus isn't there. One extra PB sandwich + glass of whole milk daily. Plan in TRACK.`});
  }

  // 9 · ACADEMIC (60-day pulse)
  if(aca.daysSince==null||aca.daysSince>60){
    plan.tasks.push({kind:'academic',id:'gpa:'+dateISO.slice(0,7),title:'Log current GPA in TRACK',
      why:aca.daysSince==null?'No GPA on record. Grades are a D1 gate, not a detail.':`GPA last logged ${aca.daysSince} days ago.`});
  }
  // 9b · FILM RITUAL (in-season, day after game): mark your best plays while fresh
  if(ph==='inseason'){
    const gd=s.settings.gameDay??5, dayAfter=((gd+1)%7);
    const filmId='clips:'+dateISO;
    if(dow===dayAfter&&!taskDone(filmId))
      plan.tasks.push({kind:'film',id:filmId,title:'Mark your 3 best plays from yesterday',
        why:'Clips picked while the game is fresh become the Hudl reel. This 10-minute habit IS your recruiting file.'});
  }

  // 10 · WEEKLY DISPATCH (Sundays — the family accountability loop)
  const wkId='dispatch:'+dateISO;
  if(dow===0&&!taskDone(wkId))
    plan.tasks.push({kind:'dispatch',id:wkId,title:'Send the Weekly Dispatch to the family chat',
      why:'Receipts + asks, one page. TODAY → Sunday Review card → COPY DISPATCH. Accountability is a team sport.'});

  // 11 · REPORTS — Day-7 first pulse, Day-30 full mirror (EXPERIMENT.md H1/H4)
  const firstDay=Object.keys(s.checkins).sort()[0];
  if(firstDay){
    const age=daysBetween(firstDay,dateISO);
    if(age>=7&&!taskDone('day7'))
      plan.tasks.push({kind:'report',id:'day7',title:'Day-7 report: open System Read in TRACK, screenshot it, send it',
        why:'One week of evidence — enough for a first honest read on adoption. Send the screenshot to the family chat with your Sunday Dispatch.'});
    if(age>=30&&!taskDone('day30'))
      plan.tasks.push({kind:'report',id:'day30',title:'Day-30 review: open System Read in TRACK',
        why:'30 days of evidence. The verdict is in your own data — read it, then we calibrate.'});
  }

  return plan;
}

function logLift(){

    <details><summary>Budget grocery list</summary><div class="bd">${fp.groceries.map(x=>'• '+esc(x)).join('<br>')}<br><br>${esc(fp.note)}</div></details>`;})(fuelPlan(Model.gaps().latest('wt')||160,S.params.kcalAdj.v))}
  </div>
  <div class="card">
    <h3>Data <span class="r">yours, protected</span></h3>
    <div class="row">
      <button class="btn grow" onclick="exportS()">⬇ EXPORT BACKUP</button>
      <button class="btn ghost grow" onclick="pickImport()">⬆ IMPORT</button>
    </div>
    <input type="file" id="impFile" accept=".json" style="display:none" onchange="if(this.files[0])importS(this.files[0])">
    <div class="note">Export monthly, save to iCloud Files. Import replaces everything on this phone (a safety export runs first).</div>
  </div>`;
}
function logMetric(){ const v=+$('#mVal').value; if(!v){toast('Enter a value');return;}
  S.metrics.push({d:todayISO(),key:$('#mKey').value,val:v,src:'manual'}); save(); rTrack(); toast('Logged ✓'); }
function setGameDay(v){ S.settings.gameDay=+v; save(); trainDay=null; rTrain(); toast('Game day set — schedule rebuilt'); }
function pickImport(){ $('#impFile').click(); }

/* ---- PUSH ---- */
let drIdx=null;
function rPush(){
  const iq=Model.iq(), plan=decide(), dr=drIdx===null?null:DARK_ROOM[drIdx];
  const engIq=plan.tasks.find(t=>t.kind==='iq');
  $('#v-push').innerHTML=`
  <div class="card">
    <h3>IQ Reps This Week <span class="r">${iq.reps7}</span></h3>
    <div class="note" style="margin:0">Engine says today: <b style="color:var(--amber)">${esc(engIq?.title||'—')}</b><br>Any rep logged here also checks box 3 on TODAY.</div>
  </div>
  <div class="card">
    <h3>The 5 Questions <span class="r">every play you watch</span></h3>
    ${FILM_SYSTEM['5_question_framework'].map(q=>`<div style="padding:7px 0;border-bottom:1px solid var(--line);font-size:13px;line-height:1.5">${esc(q)}</div>`).join('')}
    <button class="btn amber" style="width:100%;margin-top:12px" onclick="logPush('film')">RAN THE 5 QUESTIONS ✓</button>
    <details style="margin-top:10px"><summary>Play study queue</summary><div class="bd">
      ${FILM_SYSTEM.weekly_play_to_study.map(w=>`<b style="color:var(--txt)">Wk ${w.week_range}:</b> ${esc(w.play)} — <i>${esc(w.why)}</i><br><span style="color:var(--faint)">${esc(w.where)}</span><br><br>`).join('')}
    </div></details>
  </div>
  <div class="card">
    <h3>Dark Room <span class="r">${DARK_ROOM.length} scenarios</span></h3>
    ${dr?`<div class="pill amber">${esc(dr.cat)}</div>
      <div style="font-size:16px;font-weight:800;margin:10px 0 8px">${esc(dr.title)}</div>
      <div style="font-size:14px;color:var(--dim);line-height:1.6">${esc(dr.do)}</div>
      <div class="row" style="margin-top:12px">
        <button class="btn amber grow" onclick="logPush('darkroom');drIdx=null;">GOT IT ✓</button>
        <button class="btn ghost" onclick="drawDR()">NEXT</button></div>`
      :`<div class="note" style="margin:0 0 12px">30 adversity scenarios — scout team, benched, blown assignment, trash talk. Read one, absorb the response, move on.</div>
      <button class="btn" style="width:100%" onclick="drawDR()">DRAW A SCENARIO</button>`}
  </div>
  <div class="card">
    <h3>Scout Sheet <span class="r">coach-trust builder</span></h3>
    <div class="note" style="margin:0 0 10px">Fill this from one film session and hand it to your position coach each week. Almost no high schooler does this — it converts film habit into playing time and advocacy.</div>
    ${Object.entries(FILM_SYSTEM.opponent_scout_template).map(([k,v])=>`<div style="padding:6px 0;border-bottom:1px solid var(--line);font-size:13px"><b>${esc(k.replace(/_/g,' ').toUpperCase())}:</b> <span style="color:var(--dim)">${esc(v)}</span></div>`).join('')}
    <button class="btn sm" style="margin-top:10px" onclick="copyScout()">COPY BLANK SHEET</button>
  </div>
  <div class="card">
    <h3>Visualization Scripts</h3>
    ${Object.entries(VISUALIZATION).filter(([k])=>k!=='audio_guide_text').map(([k,v])=>`
      <details><summary>${k.replace(/_/g,' ').toUpperCase()} <span class="pill">${esc(v.duration)}</span></summary>
      <div class="bd"><i>${esc(v.use)}</i><br><br>${esc(v.script).replace(/\n/g,'<br>')}
      <button class="btn sm amber" style="margin-top:10px" onclick="logPush('viz')">COMPLETED ✓</button></div></details>`).join('')}
  </div>
  <div class="card">
    <h3>Injury Red Flags <span class="r">know these cold</span></h3>
    <div class="note" style="margin:0 0 8px">🚨 911 now: heat stroke (hot DRY skin + confusion) · second-impact concussion · collapse after chest hit · cola-colored urine. Never hide a head hit.</div>
    <details><summary>Full protocol reference <span class="pill">${INJURY_PROTOCOLS.length}</span></summary><div class="bd">
      ${INJURY_PROTOCOLS.map(p=>`<b style="color:${/CRITICAL/.test(p.grade)?'var(--red)':'var(--txt)'}">${esc(p.name)}</b> — ${esc(p.signs)}<br><span style="color:var(--faint)">RTP ${esc(p.rtn)} · Prevent: ${esc(p.prevention)}</span><br><br>`).join('')}
    </div></details>
  </div>`;
}
function copyScout(){
  const t=Object.entries(FILM_SYSTEM.opponent_scout_template).map(([k,v])=>k.replace(/_/g,' ').toUpperCase()+': ').join('\n');
  navigator.clipboard?.writeText('SCOUT SHEET — '+fmtD(todayISO())+'\n'+t).then(()=>toast('Blank sheet copied — fill it in Notes'));
}
function drawDR(){ drIdx=Math.floor(Math.random()*DARK_ROOM.length); rPush(); }
function logPush(type){ S.pushLog.push({d:todayISO(),type}); const c=ckToday(); if(!c[2]) c[2]=true; completeTask('iq:'+todayISO()); save(); rPush(); toast('IQ rep logged ✓'); }
/* ============ NAV + BOOT ============ */
const RENDER={today:rToday,train:rTrain,path:rPath,track:rTrack,push:rPush};
function go(v){
  document.querySelectorAll('.view').forEach(x=>x.classList.remove('on'));
  $('#v-'+v).classList.add('on');
  document.querySelectorAll('#nav button').forEach(b=>b.classList.toggle('on',b.dataset.v===v));
  RENDER[v]();
  window.scrollTo(0,0);
}
document.querySelectorAll('#nav button').forEach(b=>b.onclick=()=>go(b.dataset.v));
$('#hdrCd').innerHTML=`<b class="mono">${daysBetween(todayISO(),GATE_D1_CONTACT)}</b> days to Jun 15 gate<br>Class of 2030 · RB/LB`;
go('today');

/* offline support — guarded so non-browser test environments ignore it */
if(typeof navigator!=='undefined'&&'serviceWorker'in navigator){
  try{ navigator.serviceWorker.register('sw.js'); }catch(e){}
}
</script></body></html>
